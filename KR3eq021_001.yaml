body:
  text: 卷一竊思人賴飲食以生而飲食之烹飪必藉於水水之於人顧不重歟夫水以流動為性以潤下為德故水無不流流則不腐所謂合千派而不竭納衆流而不汙者也惟杭嘉湖蘇常數郡之水獨異於他處以地勢坦夷水極平衍自古稱為澤國而支河萬派濱汊繁多其大河之水既已平流則濱汊之間竟如止水居其所者飲於斯食於斯濯糞穢於斯若暑月旱年則熱毒蘊蓄為害尤烈考鄱陽章氏飲食辨云止水藏垢納汙飲之主多病故此處居人每患三瘧輒延綿不易愈患而癰瘍腳氣者為尤多始信章氏之言為不誣也欲康濟斯民者當以鑿井為急務焉奈水鄉之人以河汲既便遂相沿成習而不察其弊故罕知鑿井之利苟知瘍瘧腳氣之甚於他處而識其病源之在水則救弊之策曷可緩乎況鑿井而飲古之訓也且可備旱或曰吾鄉為荷葉地不宜於井噫是何言歟所謂荷葉地者以四面環水形如荷葉也凡屬水鄉大都若是不獨吾鄉爾也至水鄉鑿井及泉甚易工省價廉又何樂而不為耶且聞每有湮塞之井可見前人具有卓識而後人廢置為可嘆也若能隨處掘浚較鑿尤易惟宜冬令為之夏令地中冷恐不能深入也井口宜小庶免墮溺之虞但囿於習者難與謀始敢望大雅君子仁心為質廣為傳說身先開鑿俾人人共飲清泉而免疾病則井養不窮同享王明之福其陰德曷可量哉士雄嘗以泰西鑿井法附刊先曾祖隨筆中乙卯冬挈眷回籍居於渟溪復為此說以貽同志奈為衆議所格丙辰夏秋亢旱赤地千里余復慫恿浚河又格不行而日汲幾斷幸張君雪沂有方塘半畝頗極淵深農人欲購以戽田張曰吾將以此濟一鄉之飲者竟不售余家亦賴之飲水思源因撰楹帖一聯以贈云我澤如春仁言利溥上善若水世德流長其時余嘗遵陸游禾一路鄉民咸憂渴死石水貴至百錢大戶水費日以千計無井故耳有心有力者不可境過輒忘也章杏云先生飲食辨云凡米新者香甘汁濃養人為勝試觀作餳作酒新者之力較厚稍久則漸薄豈非陳不及新之明驗乎本草言陳者良是為病人言也以新者力厚恐貽食復之患耳又極言炒米之弊余皆韙之蓋米愈陳則愈劣納稼之時但宜藏谷隨時碾食則香味不減而滑乃嘉興等處不諳藏谷之法刈獲之後即舂而入囤用糠蒸盦數月米色變紅如陳倉之粟名曰冬舂米取其經久不蛀亦杜遠方販運以慣食此米者不出二百里之外也志乘未載不知何人作俑而土人習之翻以白米為味淡不香何異醉人視醒人為醉之顛倒耶然米經蒸變不但色香味全失而汁枯性澀是去其精華徒存糟粕也故煮粥不稠造餳釀酒皆不成與炒米相去一間耳余偶食之即腹脹便閉必啜淖糜粥數日以濡之始愈此與武彝人蒸茶為紅者同一矯揉造作今奸商更有造發急冬舂之法旬余即成隨時可作米極易敗尤不宜人紅茶亦各處效尤遍行宇內嗜痂者衆二者之弊殆不可革然知味者固自有人也又按錢塘龍井茶甲於天下邇年土人以秋採者造為紅茶頗獲厚利故聖人有鮮能知味之嘆凡藝茶亦須肥壅昔人謂專藉雲霧以滋培不待人力之灌溉者皆未經目擊之談也茶能清神醒睡止渴除煩有解風熱涼肝膽吐風痰利頭目去油垢肅肺胃之功口不渴者可以勿飲紅茶既經蒸盦失其清滌之性更易停飲昔人誇之者未免過當毀之者殊失其中章杏翁至謂為災星厄運之媒亦矯枉而失實也惟論薑茶治痢之弊為發前人所未發其辨云楊氏立此方謂東坡治文潞公有效夫蘇文二公誠名士誠貴人服藥治病不論資格苟藥餌不當恐二豎無知非勢力所能壓也醫書所列諸方嘗有某帝王某卿相試驗之說皆是遊方術士虛張聲勢哄騙鄉愚之法可鄙可笑且潞公偶然患病偶然服藥正史既所不書稗官亦復未載後世之醫何自而知乃楊氏言之李氏信之尤為不值一笑即使果有其事所患必是寒痢治而愈者得力於姜也設為熱痢而欲藉茶之涼制姜之勢豈非夢夢乃今之愚俗雖目不識丁者無不知薑茶為治痢之方逮至百用而百誤而猶圭臬奉之抑不思至此乎愚謂産後之生化湯亦同此弊惟洄溪有産後禁姜之論且曰暑證忌姜雖與芩連同用亦有大害正與章辨暗合彼詩文字畫俗眼不辨妍媸專尚紗帽已屬鄙陋醫藥亦爾豈不更可哀哉杏翁以談笑而出之其慨世深矣章氏云論語記聖人飲食不曰必以姜食亦不曰無姜不食而曰不撒姜食撒字從手檢而去之也蓋指聖人作客而言凡作客者於主人所設各隨其便不宜當食講究烹調曲禮曰毋絮羹毋啜醢絮羹啜醢是臨食時加入調和撒姜是臨食時檢出調和皆非作客之禮姜雖有害少食亦自不妨調和之內業已有姜聖人必不於食時令其檢去但不多食而已然則此句當連下句成文始為通貫乃竟講作無姜不食其誤不始於宋儒漢晉人已有通神明去穢惡之說漢人則本於神農本草經穢惡作臭惡言能去食物中腥惡之臭也而通神明殊不可解神明指人身何物蓋此書雖傳自上古其中為後人附益處甚多須善讀也朱子語録亦云秋姜夭人天年是亦明知其非佳物矣夫偏於辛而無回味即偏於熱而無回性也食之斷不宜多斷不可久入藥亦止能散寒苟無寒邪而誤用之則營血受傷津液被劫外感變而內傷矣雖有良藥無從解救慎之愚謂神明似指心臟而言以心藏神或為陰邪所侵寒痰所蔽則神為之蒙而君主不明矣並可灌以薑汁者陰寒之病藉辛以通之而神明自復也因誤信論語集注而致大病者余有治吳永言徐樂亭兩案可參又云感冒客邪如系風寒溫散故所當用倘為溫熱初起即宜清解俗人不知妄以胡椒辣枚子之類肆啖以為發散不知此類止能溫中不能散表數十年中屢見食此過多一二日即死者未死時必唇焦舌黑津液全無此靈樞所謂陰竭也陰竭者血死也又必昏昏無知此元化所謂胃爛也死後必遍身青紫與中砒毒無殊更可惡者俗傳胡椒炒雞可以調經種子豈不調不孕盡屬血寒即使果寒溫暖血室雞已足矣何必助之以椒遂致血枯經絶即俗云乾血癆是也或崩漏吐衄即血熱妄行也無病求病不死求死良可憫也愚謂俗傳調經種子等方大抵皆溫熱之品世人不察體氣病情一概恣服陰虛者必成乾血癆血熱者必致妄行章氏之言允為名論又凡婦女月信有妨於事欲其暫緩者先期以胡椒數粒冷水逐粒吞下汛即緩行別無他患蓋月事將行冷水能凝遏使之不行而胡椒極熱囫圇吞下則性不遽發數日之後椒性作而冷氣消其汛始行也逐粒吞者一口冷水可緩汛期一日而一粒胡椒能消一口冷水觀嚴寒時以胡椒水研墨則硯不冰則其性熱傷營可知矣故孕婦食之墮胎而陰虛內熱之人一切辛烈之物皆當屏絶舉此可例其餘也鴉片煙之害夫人知之而吸之者率不肯戒余竊怪之故人張孝子養之謂余曰吾嘗聞諸吸者云凡吸此煙樂不可支暢美達於骨髓賢於房事遠矣故可以移酒色之荒而沉迷於此雖至死不忍棄曷云戒乎余聞之未能深信既而楊大尹素園以飲食辨寄贈其烟葉條下附載鴉片亦有此煙一吸其樂逾於登仙雖死不悔之說信者其為淫藥矣又云吸此煙者初則壯健非常三數年漸漸黧瘦不久髓竭精枯而死始因坐擁厚資身本無病而求快樂詎知乃以求死更有富貴之家有病不肯祛邪惟喜立齊景嶽之言樂於補塞豈知其害較克伐尤烈其死乃在一朝半日或旬月之間較之吸鴉片煙為尤慘也愚按吸入腎主之又必臥而吸臥則氣歸於腎故初吸大能鼓舞腎氣令人不倦久之則精華髮越漸盡逐致形枯神槁李維鏞謂其專傷肺氣甚屬不然始則富貴人吸之不過自速其敗亡繼則貧賤亦吸之因而失業破家者衆而盜賊遍地矣故余目之為妖煙也亦有因衰病而誤墮其中者以其吸之入口直行清道頃刻而遍一身壅者能宣郁者能舒陷者能舉脫者能收凡他藥所不能治之病間有一吸而暫效者人不知其為劫劑遂詫以為神丹而因病吸此尤易成癮逮癮既成臟氣已與相習其後舊疾復作必較前更劇而煙亦不能奏效矣欲罷不能噬臍莫及乃致速死余見亦多敢告世人毋蹈覆轍章氏以立齊景嶽之法害人謂較鴉片尤慘吾鄉前輩陳乾初先生以堪輿為異端之尤謂地師之罪浮於佛老皆救世之藥石也讀者切勿視為憤嫉庶可共挽頽風泰西瑪高溫云麥教師謂鴉片之進中華創自葡萄牙人乾隆三十一年以前進口者歲不過二百箱至三十一年有一千箱三十七年𠸄咭唎人始運鴉片自天竺至中華四十三年𠸄人復自天竺運來二千八百箱但未盡賣後即運至別處去矣此時鴉片交易尚未繁盛至嘉慶二年始有四千一百七十二箱進口而交易後此漸大以後每年加損不一道光元年有五千五百七十六箱進口十年有一萬七千四百五十六箱進口自十年至二十年每年加多於二十年間有三萬四千六百三十一箱進口逮今咸豐五年則尤多矣有六萬五千三百五十四箱進口其價大土每箱計洋四百二十一元小土每箱三百六十元則今歲鴉片進口中華費銀統計四百七十八兆六百十六千四百元每箱斤兩若干較平算之如每人吸一錢則華人食此物者不下二百萬餘人噫鴉片進口逐漸加多其害愈熾愈盛伊于胡底嘉慶二年至今六十載進口之數若是之廣有心人聞之有不為之痛哭流涕者耶然此止就外國鴉片進口而論更可痛者云貴二省及浙之溫臺等處亦廣種此物將沃土之田可以種穀養人者反種此以毒人閣中華所産而計之則吸此者當不止二百萬餘人矣愚謂中華甘此鳩毒而外邦為之痛哭詢從來未有之忠告敢不亟為手録又按徐松龕中丞云天竺自六朝後皆稱印度今五印度為𠸄咭唎所轄進口貨物近以鴉片為主宇宙浮孽之氣乃獨鍾於佛國何其怪也沃土良田原以種穀養人今釀酒之米種者愈增而養人之谷種者愈減此舉世所未覺也余足跡所及雖不廣而到處咨詢凡蕞爾一邑歲費造酒之米必以萬石計無怪乎米價之日昂也先憂集列稅酒為救荒要務誠為名論按朱四輔云世儒言及生財輒以聚斂目之但他物可以不稅而酒不可不稅鹽有稅而鹽貴民不能以淡食鹽貴則艱於食矣布有稅而布貴民不能終歲不著衣布貴則艱於衣矣衣鹽之於民必不可少而且稅之酒之於民可多可少而何不稅之也況彼煮海為鹽績麻為布採天生之物而為百貨皆化無用以為有用而酒則糜費五穀以成糟粕化有用以為無用也就貨物論之而酒斷當稅矣商賈作客攜千百兩之本以涉百千里之道途有風波之恐有盜賊之憂而其利不能十一酒戶賣酒則坐擁高資優遊庭戶而其利且數倍也就商而論而酒益當稅矣如以稅酒為聚斂之事則夫理財非大學之務乎請更辨之凡民日食不過一升而尋常之量輒飲斗酒故一人之飲足供數人之食至於盛肴饌多朋侶其費又不可勝計也酒之為物勤儉多妨是故稅酒可以使民富貞節之人以酒亂性力學之人以酒廢業盜賊之徒以酒結夥剛暴之徒以酒行凶凡世間敗德損行之事無不由於酒者此書之所以作酒誥漢初所以三人群飲罰金四兩也酒之為物志氣兩昏是故稅酒可以興民教富之教之誠經國利民之善術而安得謂小人之蠹政也哉宋趙開稱為善理財其領四川財賦也言蜀民已困惟榷酤尚有盈餘遂大變酒法四路歲課增至六百九十餘萬宋儒胡致堂稱為通達事理其論酒禁之事也曰知治體者欲罷官榷酤使民自為之而量取其利雖未盡合古法亦裕民去奢之漸也其他名臣如範韓司馬名儒如朱文公真西山等論列政務俱極詳悉而從未言酒稅之非亦足以見其為濟時之要務矣又陳漱六先生云稅酒之法當行於平時禁酒之令當行於凶年儲一邑酒稅之所入即為一邑凶年之賑必平時之稅常令有餘而後凶年之賑無憂不足安不忘危以羡補不足之道也稅酒宜在城市集鎮不宜在村落村落之酒米少水多田家力作者流聊以滋氣血而和筋脈非以沉湎也一人不能耗米數合一肆日賣不過數斗稅之則損貧人且以病酒家矣市廛既稅酒則宜禁私釀不禁則酒家之入利少而稅不能取盈村落則止禁醇酒以毋令分市權也造燒酒則最耗谷麥凶年此當首禁章氏云詩八谷禾麻菽麥後人以脂麻當之夫脂麻本名胡麻來自大宛漢時始入中國僅可榨油及作餅餌不堪為飯安得三代時即列於八谷古人救飢用火麻即本經之大麻其為八谷之麻無疑至醫書本草所載香油皆謂脂麻油俗以蕓薹油為香油大謬愚按所辨皆是若云蕓薹油能使女人不孕雖見古書然世人以之為烹飪常食之物者廣矣其可盡信乎惟肴饌所需各有所宜耳至論其性則欖仁油豬油最良茶油麻油豆油次之蕓薹油為下其餘等諸自鄶凡麻菜諸油皆香而方言不同或以麻油為香油或以菜油為香油習俗難移用者貴審其宜若筆之於書必明言何油庶免疑誤至烏桕子殼內之仁榨油名青油雖香而有毒燃燈煤重鼠亦不食夏月合蘇油黃蠟造燭不堪重按而曬反堅世人又往往與他油之久窨無腳名清油者相混須知此曰青油者所以別於殼外白皮之名白油也白油色白如蠟造燭最良又名桕油皮油若皮與仁同榨者曰緑油造燭不佳性冷利凡瘡藥中用青油白油皆取其殺蟲並不可食誤食之必吐利章氏謂為大熱可食者誤也南中紀聞云茶油樹葉四季常青每於八九月間開花色白而香晝舒夜斂結實凡十餘月直至次年六月方採掇榨油足備周歲之氣以故色味清和不滑此食品中最宜脾胃者也愚按衢嚴亦有用其渣者可以浣衣去垢故閨閣中以此油加香料蒸熟澤發則發黑而不膩䐈蓋諸油惟此最清也飲食辨云咸能補腎故有堅筋骨令人壯健之功觀牛馬食鹽則肥健橐駝嗜咸故多力飼艾豭以鹽則善交則補腎之說信矣凡血證水證消渴喘嗽之外皆不必申食鹽之禁愚按焚修之人食淡者正慮腎得補而欲易動也又云月令仲夏令民毋刈藍以染鄭氏以為恐傷生養之氣夫生養之氣萬物所共何刈他草不禁獨禁藍乎至於字從監或六書諧聲之理鄭氏解為監禁亦屬牽強蓋藍主解百種惡藥毒制百種惡蟲毒退一切大熱行一切敗血是以先王之世禁之者以時當仲夏炎熇正盛毒蟲正多意在留此有用之物以救民疾觀以染二字可見言不當為染色之小用也愚謂此辨誠前人之所未及益見先王仁民之政之無微不至也又荷葉條下云東垣諸方不論溫涼補瀉必用升柴蒼葛等升散之藥數味乃至治天行疙瘩大頭證亦用升蒼荷葉三味為清震湯名其病曰雷頭風升麻荷葉助其上盛之陽邪蒼朮燥其垂竭之陰液背道離經至此而極後世無目之人猶亟稱之豈不悲哉此證之來其氣最惡死最速回憶生平閲歷惟以退熱消風解毒為主者則十全八九服清震湯者則百無一生嘗目擊數十百人矣愚謂此言是也何以於藕因其能療凍瘡遂謂其性大熱凡肺熱嗽血心熱悸遺並垂深戒殆智者之一失也夫治凍瘡之品如椒蒜之類固屬辛熱然黃柏亦治凍瘡豈可概指為熱藥乎又東垣普濟消毒飲用者亦須減去上升之藥庶免助邪之患又云丹溪倒倉法無理不通乃自明以後醫書群附和之我朝先輩謂其於人腹中作把戲是矣況牛為稼穡之資天子無故不忍宰祭祀非天神不敢歆豈可妄殺乎及觀莊子犧牛耕牛之喻知古人宰殺者惟犧牛而耕牛必不殺也愚謂丹溪義烏人彼地有豢牛以鬥者名曰操牛鬥勝則善價以爭購敗則賤賣於屠而宰之平時不事南畝食稻飲醇奉如上客此他處所無者其肉云極腴嫩人皆嗜之余失怙後蒙父執金履思丈提挈館其地者將十載因家規不食牛犬故未染指土人因豢牛而破家者不少真陋俗也不知元時已有此風否諸書未載故附録之驢騾馬屬也而騾介驢馬之間楊素園大尹云牡驢牝馬交而生者曰馬騾形較馬尤高牡馬牝驢交而生者曰驢騾形較驢為大皆有牝而無牡余謂騾既皆牝再與驢馬交而生者何名楊云騾性貞從無與驢馬交者余曰然則易言利牝馬之貞當是騾也有牝無牡正合坤之純陰以其為馬所生仍為馬類故直謂之牝馬耳大令深頷之又乾為馬馬之牝者猶是陽中之陰惟騾行最健雖駿馬不能及而性極調良故日牝馬地類行地無疆有君子攸行之象焉世傳騾之前陰有骨如環不能闢翕故性貞而不交余按女人有賦此形而不能安貞如彼者必遭産厄曩仁和謝金堂先生云有姚穩婆者嘗為其親串家洗一女即曰此女騾形長成後慎勿嫁可享長年初不信久亦忘之後適某氏孕而欲娩諸穩婆莫能措手母家遣人召姚曰我雖耄矣猶憶二十年前即囑勿嫁汝主豈不憶乎辭不往竟不産而亡噫此嫗手眼可雲精矣故於初生時一捫即知其交骨無縫也古書訛騾為螺致令費解余已考正於女科輯要中或云驢馬交非其匹而騾性獨貞誠不可解余謂人亦有之目擊屢矣當以不解解之本草據月令強分麋鹿二角有補陰補陽之別純廟謂木蘭之鹿吉林之麋角皆解於夏惟麈角解於冬曾於南苑見之特正其訛於乾隆三十三年改時憲書仲冬月令麋角解為麈角解後之修本草者當遵奉改注蠡海集云凡鳥卵皆系著於脊乃本於天者親上也脊系卵處下生一腸上口連屬於系卵卵既長足而産則入於此腸俗謂之花腸也下口乃並於直腸以通於後竅出焉凡獸之胎則系著於腹而其結處為胎室既長足則並膀胱下口以通於前竅出焉此本乎地者親下也又云天賦氣氣之質無性情雨露霜雪無性情者也地賦形形之質有性而無情草木土石無情者也天地交則氣形具氣形具則性情備焉鳥獸蟲魚性情備者也涎涕汗淚得天之氣羽毛鱗甲得地之形又云萬物之所為生者必由氣氣者金也金受氣順行則為五行之體者金生水水生木木生火火生土冬至起歷之元自冬而春春而夏夏而長夏長夏而歸於秋返本歸元而收斂也逆行為五行之用者金出礦而從革於火以成材成材則為有生之用然火非木不生必循木以繼之木必依水以滋榮水必托土以止蓄故木而水水而土是則四行之賴土以定位敵大撓作甲子分配五行為納音初一日金二日火三日木四日水五日土乃知金者受氣居先也所以金為氣母在天為星在地為石天垂象地賦形故石上云而星降雨天地氣交星者氣之精石者氣之形精氣合而水生焉故曰金生水天文志以星動搖而為風雨之候石津濕而為雨水之應豈非金生水乃氣化之義歟五行以氣為主是以五行之序以金為首也又天氣主生地氣主成水氣主化故曰三元又云梨春花秋實有金木互交之義故曰交梨棗味甘色赤有陽土生物之義故曰火棗周公謹云種竹法每歲當於新竹成竿後即移先一歲者為最佳蓋當年八月便可行鞭來年便可抽筍不過夏令早晚澆水無不活者若至立秋後移雖無日曬之患但當行鞭之際或在行鞭之後則可僅活直至來年方可行鞭後年春方始抽筍比之初夏所移者遲一年氣候矣又云種葡萄法於正月末取葡萄嫩枝長四五尺者卷為小圈令緊實先治地土松而沃之以肥種之止留二節在外候春氣發動衆萌競吐而土中之節不能條達則盡萃花於出土之二節不二年成大棚其實大如棗而且多液也愚謂此二物皆藥中上品宜廣種之徐季方云甘枸杞以甘州得名河以西遍地皆産惟涼州鎮番衛了江石所産獨佳了江石在邊外數百里為番夷往牧之地土人往取率數十人結隊晝伏夜行採不數掬即還恐番夷劫掠也道遠而得之難故甚貴乾者大如豆赤如朱即當時貴人歲得亦止升合耳黎愧曾為彼地觀察云僅二見服食家以細小紫色者為甘枸杞非也余所見真者大而赤少子即如川貝母大如龍眼川附子八隻重一斤人多不識然則燕石似玉魚目混珠天下以僞亂真大抵然也梁晉竹云世傳化州橘樹乃仙人羅辨種於石龍腹上共九株各相去數武以近龍井略偏一株為最井在州署大堂左廊下龍口相近者次之城內又次之城外則臭味迥殊矣廣西江樹玉孝廉著橘紅辨謂橘小皮薄柚大皮厚橘熟由青轉黃柚熟透才轉黃間嘗坐樹下細驗其枝葉香味明明柚也而混呼之曰橘且飾其皮曰紅實好奇之過云又範呂男粵中見聞云今售於外省之橘紅俱是增城香柚皮僞為之其柚皮薄小而尖長甚芬鬱不同別處所産故可紿人愚謂世人貴耳賤目喜以重價購僞藥橘柚易辨尚爾況罕見之物乎包公剡云黔中出九香蟲生澗水中春夏出遊水面者不可用秋冬潛伏崖石下土人掀石得蟲輒以售人服之宜子不但房術之需也服法用十四枚將七枚微火炒去殼翅及足七枚生用每服一生一熟作一次嚼食白湯下日二三次用完十四枚而止愚謂此蟲性溫助陽而秋冬潛蟄故為補腎宜男妙品若春夏浮游水面者勿用也今藥肆中所售用者鮮效豈産非其地乎抑採非其時乎嶠南雜記云試龍涎香法將結塊者奮力投水中須臾突起浮水面或取一錢口含之微有腥氣經宿其細沫已咽余膠黏舌上取出就淖稱之仍重一錢又幹之其重如故雖極乾枯以銀簪燒極熱鑽入乘暖抽出其涎引絲不絶驗果如是不論褐白褐黑色皆真又云藤江出青魚膽售者以黃藤膏混之黃藤亦能行血去翳也余過藤詢漁人獲青魚否漁人以一尾來獻狀似鯇而黑取其膽懸之船窗上越宿漿裂出過半土人云膽衣甚薄漿發即裂故難得全者張七澤云松江人謂草魚為青魚青魚為烏青草魚今人家池中用草蓄之者即鯇也愚按金華人謂青魚即烏鯔以其狀似鯔而色黑也謂鯇魚為青魚則彼俗之訛也蓋各處方言不同沿習既久雖博雅者亦承訛而不自知即此類推博物難矣至嘉興人則謂鯇魚為池魚最屬可笑夫池中可蓄之魚甚多何得獨指於鯇耶更有誤鯇為鯶為𩸩者一尋常食品尚爾難辨況遐方罕覯之藥乎青魚善啖螺螄杭人以螺螄青呼之最通使人不致混淆也筆談云吳人嗜河豚魚有遇毒者往往殺人可為深戒據本草河豚味甘溫無毒補虛去濕氣理腰腳因有此說人遂信以為無毒食之不疑而不知本草所載河豚乃今人之𩻟魚又名吐肚魚規魚胡夷魚非本草所載河豚也引以為注大誤矣愚按丁巳春錢塘姚君歐亭宰崇明招余往遊適余滯跡禾中辭不能往使者復來初夏始去姚云來何暮三月間河豚極美為此地物産之最余謂此物不吃也罷姚笑曰君惑矣止須去其肝子眼三件而洗淨其血並無所謂忌煤炲之說也吾闔署大啖試問曾有人中毒否其西席張君心鋤余戚也今春至署初不敢食及見多人食之無恙亦恣啖且云諺謂拚死吃河豚之死字乃洗字之訛苟能拼用工夫洗得淨盡可吃也𩻟魚則彼地亦有余曾染指惜河豚未嘗其味贅此以質博雅然衛生者不可以余之所聞如此遂縱爾口腹而不之慎也
