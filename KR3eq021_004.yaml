body:
  text: 卷四乙卯冬初余挈眷回籍卜居渟溪秀水呂君慎庵邀余遊新塍視屠舜傳之女適張氏者據云病起産後延已五年久臥於床勢成癱瘓廣服補劑迄不見功及入室視之病者尚著單衣貼身僅鋪草席而窗戶盡扃因詢畏熱而喜暗乎曰然按脈弦而滑執燭照之面有赤色苔甚黃膩復詢其胸悶氣升乎溲熱易汗乎亦曰然且汛事仍行飢不能食耳鳴頭暈腿軟痰多病不在於血分雖起自産後而根株實不在是細詰之始云未嫁之前宿有氣升眩暈之疾於今已十載矣余曰是也此固風陽內熾搏液成痰之證因娩而血大去故發之較劇醫者不揣其本而齊其末遂以為産後之虛溫補率投升逆愈甚下虛上實致不能行與清火降痰之劑而別曰氣得下趨病可漸愈後聞其西席鍾君子安向慎庵云服王藥五帖即能扶杖以出矣舜傳之舅嫂因用力拔針而患指痛內外雜治漸至痛遍一身臥榻不起食少形消余診之脈細而數口乾舌絳乃營陰大虧無以營養筋骨豈可因拔針起病遂以為外傷而妄投燥烈之藥乎宜其病日以甚也以集靈膏加減為方而愈謝君再華之室偶患齒痛日以加甚至第五日知余遊武林拉往視之已呻吟欲絶渾身肉顫按脈不能準問病不能答苔色不能察惟欲以冷器貼痛處余諦思良久令以淡鹽湯下滋腎丸三錢外以坎宮錠塗痛外吳茱萸末醋調貼湧泉穴次日復診已談笑自若如常作針黹矣向余致謝曰昨藥一飲即寐而病如失真仙丹也余謂昨日大窘若非素知為肝陽內熾之體幾無措手今火雖降脈尚弦數宜用滋潛善後以一貫煎方囑其熬膏服之遂不復發仁和邵位西樞部令嬡字許子雙司馬為媳者在都患心悸頭暈漸不起榻馴致不能出語旋杭多醫治之僉以為虛廣服補劑遂減餐少寐頻吐痰涎畏風怕煩溲短便閉汛愆帶盛以為不能過冬至矣適余遊武林趙君菊齋囑其邀診脈之弦數而滑面白唇紅目光炯炯而眉蹙羞明苔黃乳裂既非喑證又非失音強使出一二字則艱澀異常搖手點頭或以筆代口且無妄見亦非祟病余諦審之謂其必起於驚恐而痰涎阻於竅隧病者頷之以起病時為一大瓶墮地乍聞其聲而一嚇也遂與清心肝膽胃之法加舒絡滌痰開鬱之品服後各恙漸減眠食漸安丙辰春余復視之仍臥於床仍不出語按鈕氏續觚剩鼠魂一條與此相似彼特神其説耳然余竟不能治之使語殊深抱愧録之以質高明戊午季秋復遊武林往診尚如故聞其仍服補劑因力勸阻而贈以清肺通絡滌痰之品制丸噙化服至次年春仲遍身發疹頻吐穢痰語能漸出乃蘊結外解從此肅清可期奏績初論尚不甚爽丙辰春初余遊梅涇曹靄山茂才拉視其令郎之證云起於往夏瘧後暮熱鼻衄善欠羞明額頰時痠溲混有腳先稟素弱僉慮成勞頻服滋填毫無寸效久不起榻及余診之脈軟滑而微長苔淡黃而不渴僅能仰臥反側不能曰此非虛勞也乃熱伏陽明是以機關不利筋骨不束而見以上諸證幸衄血頻流小溲混濁熱氣尚有宣泄而人不甚枯削以陽明為多氣多血之經也與生槐蕊知柏芩梔白薇花粉茅根茹斛絲瓜絡等藥久服果漸愈里中張君雪沂令正三十七歲於乙巳年患經行腹痛醫進膠艾湯多劑痛乃日盛而加以嘔吐迄今十載諸藥備嘗邇年經至益頻痛勢益劇滿床亂滾聲徹比鄰乞余診之脈弦滑而數曰巔痛口渴乎帶多腰痛乎汛色紫黑乎病者驚以為神慘容為之一展余謂雪沂曰此證不但溫燥膩補不可用即四物湯亦在禁例宜乎遍訪女科而竟無一效也與芩連梔膽茹柏蒿薇烏鰂茅根藕為劑服至下月經行即不吐痛亦大減此等藥服逾半載各恙悉蠲錢塘張君篪伯令郎韻梅茂才之室自去年夏間娩後雖不自乳經亦未行方疑其勞也四月間患感醫進升散藥遂腹膨氣逆肢痙欲厥或又疑其娠也延余診之脈弦巔痛乃營虛肝鬱微挾客邪誤投提表耳以清解輕宣之品數劑而愈繼參養榮月事亦至人皆詫為神治其實非大病也仁和胡次瑤孝廉北上未歸其令正於仲夏陡患肢麻昏暈速余往視面微紅音低神憊睛微赤舌苔微黃足微冷身微汗胸微悶脈微弦乃本元素薄謀慮縈思心火上炎內風隨以上僭也不可誤以為痧閉而妄投香燥辛散之品以人參龍蠣菖連石英麥冬小麥竹葉蓮子心為方兩啜而愈尋與平補善其後仁和戴君文叔令嬡年十二患風斑睛赤服升散藥數帖忽覺胸次不舒飲食下咽即吐時作時止醫皆莫措六七日後其作愈頻而有欲厥之勢所親徐君樂亭囑延余診脈弦而數夜不成眠目赤未蠲苔黃口苦是發斑不由外感乃稚質陰虧風陽上越助以溫散厥少陡升肅降無權因而吐逆以連柏橘半梔苑茹旋海虴少加蘇葉煎送當歸龍薈丸一劑知二劑已桐鄉馮詒齋廣文年二十七歲自上年患癧至今已十餘枚皆破而不斂肌肉漸削逮季夏漸形發熱而納食阻膈溲短便溏氣逆嗽痰咽喉疼腫諸醫束手秀水莊丈芝階薦余診之脈數而左寸關兼弦大是病由過擾心陽兼傷謀慮從前但從呆補已成不治之證近則吸受暑邪猶日服滋填之劑是以藥造病也而詒齋一見傾心堅留數日因謂其令兄靜岩贊府曰余僅許愈其新病也以沙參苡斛橘半蒿薇蛤殼浮石茯苓煎吞香連丸二劑而痛瀉漸止去香連加鱉甲又二劑而熱退改用參苓橘半苡蠣石英首烏象牙屑冬蟲草等出入為方臥時另制噙化丸以肅上焦痰滯服四帖已能起榻眠食皆安余遂歸秋杪聞其沒於魚江外科家少年博學惜哉余郵挽一聯云傾蓋相知詎成永訣著書未竟遽赴修文知渠方注顧亭林先生肇域志而即病也其夫人即於秋杪起患赤痢延至次年春杪證已瀕危適余遊鴛湖往視之晝夜三四十行汛斷肌消少腹素有聚瘕躍躍而動氣衝胸下絞痛難堪臥不能眠飢不能食口乾舌絳五熱溺無頭項汗頻音低色奪脈來細數右軟尺空是久積憂勞兼傷哀慟真陰素弱豈可與常痢同觀以沙參熟地黃連黃柏白頭翁秦皮冬蟲夏草枸杞橘核白薇用藕苡燕窩煮湯煎藥服二十劑余遊瀛洲轉禾復診脈和痢減安穀能眠痛止溺行面有華色改用人參熟地龜版歸身黃連黃柏枸杞白薇薏苡砂仁以藕湯煎成入阿膠煬服而愈項君香圃患赤痢瀕危所親莊眉仙少府拉余往視脈細不飢口乾舌絳形消色瘁不寐溺無禾中醫者以其素耽曲糵輒進苦燥滲利之藥而不聞景嶽云酒之為害陰虛者飲之則傷陰也況病因暑熱不夾濕邪溫燥過投陰液有立涸之虞余將旋里為定西洋參生地甘草銀花石斛麥冬生白芍扁豆花枳椇子藕汁一方冬瓜湯煎令其恣服次年春余往禾候莊芝階先生之疾有一人來拜謝面如重棗素昧生平甚訝之眉仙曰即香圃也面向赤上年因病危而色脫故先生不識耳承惠之方服十餘劑而愈今又善飲如昔矣角里街怡昌燭鋪蘇嫗年已六旬偶患腹痛醫謂寒也進以熱劑痛漸劇而腹脹便閉按之甚堅又以為腸癰攻之而愈痛遂絶粒不眠呼吸將絶挽余診之脈滑而數舌絳苔黃口臭溺無熱阻氣也以雪羹煎湯調益元散五錢徐灌之即痛減氣平次日以雪羹湯送當歸龍薈丸三錢便行溺暢隨以輕清藥數帖而痊七月中旬余遊槜李歸道出梅涇呂君慎庵拉視沈則甫令正之恙兩年前曾患滯下嗣後便瀉不已今夏更劇每晨尤甚後重腸鳴不飢不渴畏熱無汗胸悶時嘔夜不成眠形消色瘁小溲通暢脈軟微弦經事漸稀乃中虛木侮生化無權氣久虛而血將涸矣若剛燥則助風陽滋膩更增滑溜議砥柱中流回狂瀾而鎮風輪以潞黨參山藥石脂餘糧各三錢茯苓白芍各一錢五分煨訶子橘皮各一錢牡蠣八錢烏梅肉炭八分酒炒黃柏六分熟附子炙甘草各五分甘瀾水煎陳米湯煮藥使濃厚徐徐細呷俾留戀中宮不致直下為法逮八月下旬在曹靄山茂才處晤則甫云前方服至四劑病即愈今已色華能食矣因以詩什芽茶為贈次年冬聞患寒熱亡山妻懷孕四月患間瘧腹痛便溏汗多嘔悶乃痰氣內滯風暑外侵脈滑而弦與枳桔蘇連柴芩菖夏三劑而瘳大女馥宜患微寒熱熾每發於夜汛不當期而至口渴便閉目眩多汗米飲不沾暑熱為瘧也脈洪數以知芩橘半蒿薇鮮斛元參梔子花粉服六劑而熱減大半去蒿半加西洋參麥冬竹茹枇杷葉又六劑而便行瘧止隨去元參鮮斛加歸身調之而愈季傑弟簉室之瘧日輕夜重少腹覺有塊上衝則嘔嗽並作杳不進谷余遊禾歸已交八日矣脈軟以澀是肝鬱於內暑侵其外也用芩夏翹滑菖蛤蘇連旋橘絲瓜絡服六帖諸恙霍然隨與清養善後仲秋二十八日余遊濮院歸是夜又陡患霍亂腹痛異常余起診其脈細數而弦肢冷畏寒蓋覆甚厚詢其口不渴而瀉亦不熱惟小溲全無吐者極苦舌色甚赤乃新涼束暑也玉樞丹絳雪灌之皆不受瀉至四五次始覺漸熱而口大渴仍不受飲語言微謇余令搗生藕汁徐灌之漸能受隨以芩連苡楝梔斛桑葉煎服痛即減吐瀉亦止次日知飢略受食神憊已極筋絡痠疼與清養法而痊硤石鎮蔣寅昉大理令正久患少腹聚氣時或上衝於胸而為脘痛時或下墜而為腿腫帶多汛速腹脹胸悶口膩不渴便雖溏而欲解不行必啖鹽而始暢皆以為脾虛率進補劑病日以甚迎余診之脈弦滑以梔芩菖枳連夏茹旋雪羹清肝熱以豁痰滯氣果下行至足而胸腹漸舒管君幼齋令正汛停七月至仲秋經行不多腹乃微脹繼則胸悶不飢身有寒熱呂某以桂枝黃連等藥進而痞悶轉加二便不行口糜而渴得飲即吐夜不能寐五內如焚余診之脈弦而細面赤足冷神憊不支是營陰素虧氣機多郁郁久生熱辛燥忌投授沙參蔞薤梔茹旋苑冬瓜子枇杷葉二劑而燥矢行胸腹舒知飢吐止繼以宣養而瘥其汛停良由血不足非有血不行而阻也前月中旬余過濮院有香海寺前一婦患三瘧求診面白唇紅舌絳而渴寒微熱盛溲短便艱汛事先期不眠脈數乃暑邪侵營也與元參丹皮知薇蒿梔花粉鮮斛竹葉之方至八月下旬再遊其地渠復求視云前方服即病減至二十劑而痊乃子以為病後須服補藥才四帖瘧復作遂不敢再進余謂此必溫補方也閲之果然仍授清化之劑五服而瘳仲秋偶覺左乳微疼按之更甚始知有堅核如小豆大外微腫即取外科藥圍塗而以紙蓋之逮藥干揭之甚痛余不能忍且僉云必破而不易收功以其在乳盤之內也余不畏死而懼不能受此楚毒因往求呂君慎庵視之曰無慮也掃榻款留日以蔥白寸許嵌入梅花點舌丹一粒旋覆花三錢煎湯下外用洄溪束毒圍圍之亦以紙蓋之而藥干則自然脫落略無黏肉伐毛之苦此玉精炭之妙用也凡十二日核漸消盡深佩呂君之德謹録之以識其手眼之不可及而方藥之效驗俾後人亦有所徵信也一鐵匠婦患感雜治經旬身熱不退不眠妄語口渴耳聾求治於余脈來細數唇紅面白肌瘦汗頻雖是貧家卻為嬌質神虛液奪余暑未清以西洋參甘草小麥黃連麥冬石斛丹參蓮心竹葉為劑服之神氣遂安自云心悸因加紅棗與紫石英服之浹旬竟以告愈九月初旬蔣君寅昉招余治其令兄仲卿孝廉夫人之病年五十九歲平素操持腹有聚氣脘痛時作大便易溏半月以來身熱耳聾病瀉不食胸中痞塞痰韌如膠口膩欲嘔神情憊甚脈來虛弦而細舌苔黃膩無津乃營津久耗氣鬱不舒既挾客邪過投清散以致本實欲撥也與參苓橘半蔞薤茹連菖斛燕窩枇杷葉用水露煎服三劑後瀉止痰稀胸寬進粥醫見苔退舌紅驚為脫液仲卿復延余往視乃病退之象也舌上無津前案已述今脈漸轉如何反為詫慮於前方去蔞薤連半加歸地麥冬藕服之而愈朱氏婦患赤痢匝月多醫雜治痢止三日矣而起病至今胸痞頭脹米飲不沾口渴苔黃瘦熱而痛凜寒身熱夜不成眠神憊形消諸醫技窘乞余往視脈數而弦伏暑未清營津已劫氣機窒塞首議清泄南沙參石菖蒲蔞薤梔芩茹連橘半白薇紫菀四劑而痰活胸舒寒熱大減且能啜粥改用北沙參生首烏柏子仁冬瓜子元參蔞薤菖梔二劑堅矢下授清養法而痊錢君友琴年五十九歲曾於七月間患滯下自服大黃一劑而瘥季秋患寒熱時作自服柴桂等藥病益甚狂躁欲啖西瓜而服石膏余診之脈滑右甚苔色膩黃便祕溲短胸痞不沾粒米乃暑濕挾痰阻於氣分治宜開泄白虎不可投也用蔞薤枳朴連夏茹芩苑桔服三劑二便既暢胸次豁然而愈矣方氏婦勞傷挾感業已治愈服補藥數劑漸形浮腫或謂邪未淨而補之早也用消導清解法皆不應且兼咳逆礙眠便溏溲澀又謂腎氣不納改從滋填其勢益增遂束手矣挽余視之脈浮無汗尺靜經行既非根蒂之虛亦豈邪留誤補殆愈後復感風邪肺氣阻痹水津失布所謂皮水證也與香薷杏仁紫蘇橘皮兜鈴麝干紫菀通草蔥白天泉水蘆火煎服覆杯而愈余雖挈眷回籍而會垣戚友未能恝然置之故時往寓焉今歲六月初二日剌船返里欲避暑月應酬之繁也嗣因亢旱河涸舟楫不通或以肩輿相招余畏長途而卻之中秋後河漸通乃二十夜夢先慈以不必晉省為訓初謂心有所憶也至九月下旬欲展墓於皋亭山因赴杭視弟妹舟人忘備白米強啖冬舂米飯一餐遂腹脹不飢越日抵寓身漸發熱徐君亞枝為余多劑清化至十六日始解極堅燥矢解後大渴喜飲少頃則傾囊而吐吐則氣自少腹上湧味極酸苦甚至吐蛔趙君笛樓診云十六日不食中已大虛一解之後更無砥柱故肝木乘而沖侮也投參苓椒梅萸連橘半茹薑等四劑吐止稍進飲食然肌肉削盡寐則肢惕而稍一展動則絡痛異常大解必旬日一行極其艱澀扶病而歸兩跗皆腫自知虛不易復而性不受藥遂啖肥濃至冬杪腫消而大便始潤津液易奪而難復如此且稍或煩勞即作寒熱至次年三月各恙始休而步履如常惟肌肉不能復舊以脾主四肢胃主肌肉而束骨利機關也余脾胃素弱故畏藥如虎稍有惡劣之氣者飲之即吐若吞丸藥則不能克化生冷硬物概不敢嘗最奇者冬舂米飯之氣亦所素畏偶食之輒小病而未有如此之劇者嗣後不敢略試矣且深悔不遵先慈夢示遂息影窮鄉不復寓省乃不知者徑目余為神仙中人蓋余能安其癡也而吳越之間亦未嘗不偶遊焉次年夏遊武林晤許貫之茂才見其令嬡璟姑患疳膨聚氣云起於桐鄉外家食冬舂米飯也可見人之脾胃有同於我者矣秋杪山妻懷孕已七月又患瘧醫從清解不應半月後轉為間作時余臥病省垣家人恐添憂慮初不我聞延至匝月病漸瀕危錢君意山管君芝山放棹迎余扶病歸來診脈軟滑而尺帶虛弦凡瘧至一時之先必大渴背麻脘悶既熱則頭疼腿足腫脹寒不過一時而熱有七八時之久骨瘦如豺肌膚甲錯便堅溲澀心悸無眠目不見人舌光無液乃真陰素虧水不涵木風陽內熾耗血傷津兼挾勞傷而吸秋熱熱茗頻啜米飯惡沾腰痛而胎動不安勢已十分險惡遂與西洋參元參知薇蒿菊菖麥梔甘桑葉竹瀝兩劑嗽痰甚多渴悶稍減去桑菊梔蒿加橘紅八分蘇葉五分蔥白兩莖又兩劑瘧止吐痰更多舌色漸潤去元參知薇加冬瓜子茯苓蛤殼一劑嗽雖減而左脅時疼乃用北沙參熟地麥冬蔞仁楝實石菖蒲絲瓜絡十大功勞藕以養陰柔木而清痰熱服之甚妥然目雖能視而早晨必昏臥如迷遂增熟地加白薇歸身一帖寒熱陡作面赤氣衝或咎補早瘧復余曰非也此不耐歸身之竄動耳即去此一味加蔥白蒲桃干服之果愈隨去蔥白加甘草石斛兩帖嗽大減胃漸和更衣較潤惟手心如烙兩足不溫乃易沙參以西洋參去蔞楝而加生牡蠣一兩鹽水炒橘紅一錢二帖足漸溫痰漸濃而腰痛脅痛未已又加酒炒知母一錢兩帖痰出極多昏臥始減惟納食如噎火降即飢舌辣齶干小溲尚熱改用西洋參二地二冬二至知柏牡蠣十大功勞少佐砂仁為劑服六帖各恙皆已能起榻而腿軟齶干神猶貿貿即以此方加白芍木瓜石菖蒲熬膏服至冬至後神氣始爽而痊秀水董君枯瓠之夫人余於秋仲偶診其脈知其八脈久虧積勞多郁故指下虛弦而澀寒熱時形虛火易升少眠善悸性又畏藥不肯節勞至冬令證類三瘧余以病未能往視來信云桐鄉傳一妙方治三瘧效驗如神方用甜茶半夏各二錢川貝檳榔各三錢橘皮甘草各一錢五分乾薑一錢木香五分凡八味已服三劑而瘳余即函覆云此乃劫劑僅可以治寒濕飲邪為患之實證設虛證熱證服之雖愈必有後患故抄傳單方最非易事若好仁不好學功過恐不相敵也既而病果復作較甚於前余與呂君慎庵同議鎮養柔潛之法始得漸愈後聞服此方者率多反復乃郎味清茂才深佩余之先見云張寶商室患凜寒乍熱咳逆形消面赤少餐經遲眩暈醫投補劑盜汗帶頻咸謂不能過春矣余診之脈弦滑而數本非虛勞無須補藥乃肝陽內盛搏液成痰阻塞氣機法宜清展以元參丹參紫菀白薇青蒿黃柏石菖蒲菊花竹茹竹葉為方每服送當歸龍薈丸一分二十劑遂健如初馮益三令正上年春汛偶愆頗露虛象群賢咸以為損余診為孕季秋果舉一男至丁已春初産逾三月既不自乳汛亦未行偶感客邪醫療半月漸至不飢不食氣自少腹上衝似有聚瘕嘔惡腹痛面黃形瘦溲熱便溏口渴帶多面浮咳逆僉云已成蓐損復延余診脈滑而弦遂以孕斷與沙參蘇葉桑皮冬瓜皮黃芩枳殼石菖蒲白薇橘核楝實煎送香連丸三服霍然復聞六月中旬産一女甚快郎氏婦崩後淋帶五內如焚溲熱口乾不飢脘悶腰疼肌削臥榻呻吟頭暈耳鳴夜不能寐脈來細數少腹不舒滋補雜投皆不見效余以沙參菖蒲斛柏薇苓蛤殼冬瓜子藕十大功勞先為清展服五劑熱退渴和脘舒安穀且能起坐夜亦能眠其氣機已調暢矣參入潛陽養血而瘥梅溪蔣君寶齋令堂自上年夏秋間患痢之後神疲少寐不能起床醫謂其虛率投補藥馴致驚疑善悸煩躁囈語脅痛巔疼耳鳴咽痛凜寒暮熱大汗如淋暈厥時形愈補愈殆李君蒼雨邀余診之脈弦滑而數白睛微紅而眼眶如墨舌絳無苔因問胸悶乎曰悶甚便祕乎曰祕甚溺熱乎曰熱甚豈非氣鬱而痰凝痰阻而氣痹肺胃無以肅降肝膽併力上升濁不下行風自火出雖年逾五旬陰血不足而上中窒塞首要通陽為處小陷胸加菖薤旋茹苓枳郁李仁群醫謂是猛劑無不咋舌寶齋云鎮補滋斂業已備嘗不但無功病反日劇且服之果一劑知三劑安已而余有會垣之遊前醫謂病既去復進守補月餘仍便祕無眠胸痞躁亂加以發斑腹痛人皆危之時余遊禾中函乞往視仍用前法增損合雪羹投數劑連得大解率皆堅燥改與柔養更衣漸暢粥食漸增以潛鎮舒養之劑善其後仁和彭君芝亭之三令嬡年甫逾笄自去秋患痰嗽內熱漸至汛愆減食咽爛音嘶肌瘦便溏不眠心悸丁巳正月下旬專人逆余往視左脈細軟而數寸尤甚右尺洪數寸關不耐尋按殆燥邪薄肺初失肅清陰分素虧源流兩涸今胃氣已敗萬物發蟄之時如何過去其二令嬡深諳醫理極以為然適邵位西樞部持蔣大理之函相召余即解纜嗣接趙君笛樓信云彭證果歿於驚蟄前三日抑何脈之神耶余謂亦偶然事耳如前年五月間偶診顧聽泉明經之脈即謂家竾伯茂才云顧君不可以冬蓋石象已見也後竟歿於立冬之刻今年二月診莊丈芝階脈謂其文孫眉仙少君云恐難以夏而立夏前三日竟逝十月初遊武林訪家瘦石兄切其脈尺中微露浮弦即謂其子曰春令可虞亦於次年驚蟄日無疾而終脈之可憑者如是而竟有不可憑者此其所以為深微之學乎蔣君寅昉太夫人患恙適余遊武林專丁招往病已七日齦糜頤腫寒熱時形脘悶頭疼不眠不食苔黃便祕脈數而弦是冬令伏邪發為溫病血虛肝旺稟賦使然以枳桔羚翹梔菖蔥頭兜鈴麝干為前茅三劑而熱退腫消以小陷胸合梔豉加菖苓竹茹雪羹開中堅亦三劑而便暢胸舒漸啜糜粥以西洋參肉蓯蓉麥冬石斛川貝母竹茹歸身知母黃連為後徑漸安眠食而痊其庶祖母年八十六歲患胸悶便祕少腹瘕痛夜分凜寒兩目更冷不飲不食口苦息粗咸以高年為慮按脈弦數而澀此肝氣素滯食阻上焦升降並愆故脈澀而息不調也豈可誤以為正氣之衰乎進枳桔蔞薤菖苑蘇連橘核旋覆之方投匕而瘥次年春病復如是而較甚余亦以此法瘳之寅昉曾於去冬患血溢與清舒肝膽而安惟久患不眠臂冷食少自云服補心丹及知柏八味丸甚合余曰脈至弦細而緩因賦質陰虧心多思慮五火內熾爍液成痰阻礙氣機故脈證如是滋膩之藥不可再投用沙參丹參絲瓜絡茅根旋覆橘半菖苓服十餘劑而愈梅里任會嘉令正年逾五旬季春患證漸劇訪余視之身熱頭疼凜寒胸悶氣衝無寐神憊音低苦渴嗽痰乾嘔便閉脈甚細軟延已旬余咸以為虛欲投補劑余謂陰分雖虧氣鬱痰滯溫邪留戀胡可補耶輕展清宣庶乎合拍以蔥豉合小陷胸加南沙參麝干馬兜鈴通草竹茹二劑而熱退嘔吐止去蔥豉兜麝加梔貝芩菖三帖而便行胸適得寐知飢改投柔木涵陰而愈錢塘姚歐亭大令宰崇明其夫人自上年九月以來夜不成寐僉以為神虛也補藥頻投漸不起榻頭重如覆善悸便難肢汗而心內如焚多言溺暢畏煩而腹中時脹遍治無功其西席張君心鋤屢信專丁邀診余不獲辭初夏乘桴往視左寸關弦大而數右稍和而兼滑口不作渴舌尖獨紅乃憂思謀慮擾動心肝之陽而中挾痰飲火鬱不宣溫補更助風陽滋膩尤增痰滯至鹿茸為透生巔頂之物用於此證猶舟行逆風而扯滿其帆也明粉為芒硝所煉投以通便是認為陽明之實祕也今脹能安穀顯非府實不過胃降無權肝無疏泄乃無形之氣祕耳遂以參連旋枳半芍蛤茹郁李麻仁鳧茈海虴兩服即寐且覺口苦溺熱余曰此火鬱外泄之徵也去蛤殼加梔子便行脹減脈亦漸柔再去麻郁雪羹加石英柏子仁茯苓橘皮小麥蓮子心紅棗核三劑各恙皆安去石英梔子加冬蟲夏草鱉甲為善後余即挂帆歸矣然不能靜攝季夏漸又少眠復遣丁諄請余畏熱不行命門人張笏山茂才往診遵前法而治遂以告愈崇明刑幕吳江史勵齋令正久患少腹聚瘕時欲攻痛羞明心悸汛速帶頻向服補藥交夏發之更劇醫用膠艾湯加參朮耆茸峻補痛益難支遂致暈厥不眠不食業已四朝屈余視之脈來弦滑苔黃苦渴溺熱便難與沙參石英龜版鱉甲蒿薇苡柏鰂虴茹菖一飲而病如失眠食皆安贈以清養柔潛而別余遊瀛洲有越人李姓挽心鋤茂才見余云親串中一婦人因娩後嗽血遂至兩目無光四肢嚲不能動欲求一方張謂如此大證未審其脈如何施治余曰吾知之矣此肺熱欲成痿躄也遂以西洋參桑皮元參百合知母苡仁藕茅根枇杷葉為方服六劑聞余將歸李亟來署致謝云病去大半矣真仙丹也欲再求一方余為加葳蕤一味然此由海外因不知有産後宜溫之謬説故無人阻撓而得偶然幸愈也楓涇程笙伯令正半産之後汛事先期淋漓不斷時且痛脹齦衄減餐苦渴苔黃脈弦而數頻服補劑久不能瘳余投沙參龜版制香附絲瓜絡茹楝菖蒿桅薇柏藕十餘劑次月經即調復來求診與柔養善其後細君上年病後以清養藥熬膏服至歲杪已康復勝常孟春十八日分娩亦快健七日後余即遊武林繼返硤川由梅溪而遊嘉秀至清明歸為展墓也知其左乳裂疼乳房亦癢搔即水出起已月餘初謂外恙不足慮令取瘍科善藥敷之余復鼓棹遊梅涇而至槜李又浮海遊崇沙逮歸已屆端陽矣見其右目胞坍而甚赤詢厥乳患左加甚而更及於右諸藥久敷皆無偶效且兼氣衝痰嗽口渴膚糙蓋津液悉從外患而耗也察其脈滑而數良由肺胃熱熾使然遂授元參石膏知翹甘苡蔞梔菖菊蛤殼銀花等二十餘劑而各恙並蠲既而余遊吳越間者月餘歸見其遍身暑癤形瘦少餐食後神疲二便不暢脈則弦澀不調與元參絲瓜絡梔連菖橘蔞苑薇蘇四帖而經月之病若失亦因氣鬱熱壅也可見治病必探其源勿徒遏其流而故人管君榮棠嘗謂外證不宜服藥蓋為服不得其當及信書太過泥用成方者言耳若宣氣清血之法原不禁也沈雪江光祿年五十歲於客臘偶患頭暈既而右手足麻木醫進再造丸十餘顆漸至攣曲不伸針藥無效仲春余遊槜李吳門李君雨村招往視之手足亦腫而疼便堅溲赤口乾舌絳準頭一瘰磊然脈象弦滑而數平時屢有鼻衄肝陽易動曲運神機體質性情陰虛火盛風自火出爍液成痰竄入絡中則為是證初起若以竹瀝一味灌之可以漸愈乃溫補率投遂成錮疾幸而病在經絡停補尚可延年苟欲望有轉機必與清通宣泄擬方三劑腫痛稍瘥議者謂藥太清涼多服恐妨脾胃更醫復事溫補並雨村亦不延診矣逮四月中旬大便忽祕飲食不思半月餘更衣極艱滯而解後胸次愈形窒塞遂不食然參藥不輟也至五月十八日復解燥矢仍不思食勉強啜粥輒嘔吐次日轉為滯下色如魚腦日數十行醫謂有出無入脾腎兩敗矣溫補方再加固澀之品遂鼻血如注且有成塊成條之堅韌紫血自喉間湧出雖米飲不能下咽小溲澀滯不行時欲呷茶以潤口或云已傳關格無藥可圖而引火歸元之法愈用愈劇諸醫無策眷屬皇皇業辦後事矣乃弟云峰待詔余春時所囑挽人聘余往援二十四日余抵禾見其面色枯黧牙關緊而舌不出齒脈至右滑左弦細數皆上溢而尺不應指胸悶溺澀陽宜通而不通是滋膩阻塞氣道也血溢下利陰宜守而不守是溫燥灼爍營液也吾先慈所謂人身如欹器滿則必覆半年蠻補填滿胃中設不傾筐倒篋而出亦必塞死豈可不加揣測而誤認為神機化滅之出入廢關閘不禁之下利陰盛格陽之吐衄而再施鎮納堵截之藥哉古云上部有脈下部無脈其人當吐不吐者死今火熾上炎鼻血大流湯水不能略咽有升無降與吐何殊況見證雖危而呼吸不促稍能安寐皆是未絶之生機考古下利而渴者屬厥陰白頭翁湯主之滯下不食者為噤口參連湯主之余合而用之加石菖蒲宣氣通陽石斛茅根生津涼血一服而利減其半次日去連柏加元參犀角童便專治其衄一服血漸少利漸止然離絡之血不可不使之出未動之血亟當使其各安於位故以西洋參丹參麥冬茯苓菖蒲石斛小麥竹葉梔子甘草梢燕窩等出入三劑血既止牙關漸開苔色黃膩啜飲必拍膈始得下行因參以小陷胸法數劑自覺身體略輕手腕稍舒改清肅肺胃展氣化以充津苔漸退渴亦減脈較平守至閏月二十二日尺脈滑動於方中加肉蓯蓉麻仁二味夜間即解堅黑燥矢而漸能進粥隨去麻蓯加生地服至六月初七日口始不渴而吃飯繼因過飲西瓜汁大便溏瀉復延余往以六君去朮草加苡藿數帖而安隨去藿加首烏絡石石斛十大功勞服二十劑漸能起坐右腿可以屈伸但軟而無力耳中秋後又邀余往則胃氣已復右指已伸皮膚色澤而右臂未能動右頰猶覺木硬是絡中之痰未淨肝臟之風易生氣血之灌溉流行因有所阻礙而不能貫注也以養血息風蠲痰宣氣之方加竹瀝為嚮導服後足漸能立十月間食蟹過多大解泄瀉余以六君加藕木香蘇葉調愈嗣余遊盛湖轉禾適交至節而天暖不藏又因勞怒陡發頭暈嘔吐痰涎目閉不言不食不便舉家無措醫者率主首烏牡蠣等滋攝之治餘脈之弦而緩是中虛不能御木故內風上僭陰柔之品徒滯中樞不可服也仍用六君去甘草加菖蒲黃連旋覆花薑皮鉤藤三劑霍然小寒後余遊姑蘇轉禾又因天暖而發鼻衄改換養陰潛陽法而瘳次年春季出門因不節勞至端陽復中而逝季夏余遊槜李陸君又溪邀視其友王姓之病寒熱時作汗多不解便溏不暢溲赤妄言面黑如煤苔黃大渴煩燥氣逆脈滑而洪按其心胸堅硬而痛乃暑濕挾痰食也群醫但知時感輒進寒涼聞説胸次不舒遂疑為疹羚犀膏地力竭計窮已囑病家備後事余曰此非重證何必張皇撤被啓窗勝於服藥病家唯唯而不甚信余即手為揭被開窗病人唶曰舒暢多矣藥以小陷胸加芩枳翹茹薤菖海虴數服而愈繼有里中張姓者證相類面不黑而紅舌無苔而干諸醫亦不察其氣分之尚結痰食之未行屢進生地唇齒漸焦遂束手余以小陷胸加元參海虴菖枳芩翹一飲而脘舒得臥齒舌皆津蓋結散邪行則氣通液布也乙卯六月餘三媳患感身熱頭重脘悶頻嘔不食耳聾余投清解藥一劑病不少減而汛事非期而至邪雖尚在氣分但營陰素虧恐易陷血室亟迓半癡至投小柴胡加減一帖病少瘥而虛象畢呈少腹右角甚形掣痛半癡於清解中即佐養營通絡柔肝之品服四劑證交七日得大戰汗而愈原方為三兒遺失惟記後四劑重用乾地黃為君是血虛者必養血則得汗而兒婦氣分甚郁苟不先行清展氣機則養血之藥不能遽入此因事制宜之所以不易也要在先辨其體氣與病情耳更奇者同時余內侄許貫之茂才室體極清癯似較余媳更弱且娩已五次而産後即發壯熱半癡視為暑證投大劑涼解數帖即戰汗而瘥無何胃氣漸復忽又壯熱便閉渴悶不飢不食或疑新産誤餌涼藥使然幸病家素信仍延半癡診之右甚滑實曰食復也詰之果啖豆腐稍多遂投枳實梔豉湯加蔞翹桔薄蘆蔔汁三啜而痊斯人斯證使他醫視之必以為營陰大虧矣而半癡獨不顧及憑證用藥應手而痊且愈後不勞培補尋健如常可見産後不必皆虛而體氣之堅脆亦不能但憑於形色之間也嘻難矣丁巳冬余假館潛齋適半癡草歸硯録余讀至結散邪行氣通液布二語因追憶兩案筆之於此又可見佳案之遺漏尚多惟冀同志者抄存以期續採仁和徐然石附識七月初旬余遊鴛湖歸三侄壽和陡患凜寒身熱筋瘈面紅譫妄汗頻四肢厥冷年甫六歲其母危之余察其苔色黃膩口渴唇紅乃停食感冒耳以枳實梔豉湯加菖蒲及冬干之蘆蔔葉煎成調入玉樞丹五分灌之次日譫瘲皆減而腹痛微有吐瀉寐醒則神猶瞀亂知其邪有外泄之機治當迎刃而導於前方加蘇葉一分黃連二分同炒煎服連吐三五次瀉六七次痛即減第三日神情爽慧余謂去疾莫如盡再服原方一劑遂愈蓋小兒之病因於食滯者多胃不和則臥不安陽明實則譫妄而世人輒作驚風治之每致僨事昧者更惑於巫瞽而祭非其鬼則尤可笑也八月初余遊虎林歸二女定宜患感旬余熱雖退而乾咳無痰不眠不食不便胸腹無所苦湯飲亦不思五熱形瘦僉慮成勞余按脈弦細是痰阻而氣不通也以紫菀白前蔞仁薤白橘紅半夏菖蒲竹茹枳殼桔梗服數帖漸愈三女杏宜年十四因侍姊病過勞且浹旬風雨寒氣外侵而自恐不支勉強納食起病則凜寒微熱腿腫而痠泛泛欲嘔兼以微嗽適余歸之次日也視其苔微黃而膩尖微絳脈緩滑以枳實梔豉湯加前蘇杏桔芩蔔飲之日晡余遊南鄉歸內子述服藥後神情昏瞀嘔出藥食恐夾痧邪曾為刮背余謂此食滯上焦濁未下行耳逮夜頗靜詰朝察之胸仍拒按原方加菖蒲紫菀投之余即遊硤川黃昏而歸內子云午後神復瞀亂恐有變證明日君毋他往也余頷之夜間亦靜次早問答如常胸猶拒按因其吐既未暢大便未行以前方合小陷胸為劑外用朴硝罨其胸次至已刻即神昏如寐引衣自覆呼之不應時或妄言面色晦滯四肢時冷內子對之下淚余按脈如故確係濁氣上熏清陽失布既非寒邪深入亦非溫熱逆傳原方再服一劑病如故余再四思維徑以薤白石菖蒲各一錢蔞仁三錢煎成和入醇酒一杯灌之外用蔥白杵罨胸次牙皂末吹鼻取嚏時將薄暮至初更始得微汗而肢和尋即溏解一次而識人夜分安眠第四五日胸次已舒略無譫語乃目有妄見寐即惡夢時有潮熱余以蔞薤菖茹翹薇苑半梔豉省頭草等藥通府滌濁連解三次各恙皆安改用清肝肅肺法至七朝身涼全愈繼治蔣君寅昉五令郎全官身熱筋瘛不啼不乳神呆嗜臥或疑驚風夤夜逆余往視乃風熱夾食也與開泄清解法數帖便行而痰漸嗽出病即漸瘥此等雖非大證設稍誤治告危極速故連類録之以備大匠木屑竹頭之需管君芝山拉余治其表嫂吳媼年五十五歲上年仲夏患癃二十餘日愈後小溲迄未通暢已成錮疾今秋分後溺祕不行醫療旬余溫如薑桂烏藥涼如梔芩黃柏利如木通滑石皆不效甚有用益智等以澀之者漸至腰腹皆脹而拒按胸高腿腫不飢不食大便不通小溲略滴幾點熱痛異常舌絳無津渴喜沸飲而不敢多啜以增脹滿呻吟待斃脈軟而微乃陰虛氣化無權也以沙參熟地連蔞苓澤麥冬紫菀牛膝車前加附子一錢桂心五分煎成冷服一周時溺出桶許而大便隨行進粥得眠口苦而喜涼飲即去附桂連蔞苑膝加知柏芍藥砂仁數服而起緣境窘不復調理錮疾聞猶存也盛澤王西泉丈仲郎巽齋刑部夫人年未四旬而十八年前誕子之後汛即不行醫以為虛頻年溫補略無小效董味青茂才囑就余診脈弦滑而體甚豐乃氣鬱生熱熱爍津液以成痰痰復阻其氣道不能化血以流行以致行度愆期腹形脹痛肢背不舒骨疼寐惕渴不欲飲間或吐酸二便不宣苔黃口苦皆風陽浮動治節橫斜之故也與沙參蛤粉各四錢絲瓜絡石菖蒲各一錢紫菀仙夏旋覆蒺藜各一錢五分茯苓三錢丹參二錢黃連四分海虴二兩鳧茈一兩服十餘劑來轉方云脹痛蠲而腹背皆舒夜寐安而二便亦暢酸水不吐痰出已松是肝已漸柔惟食少無味骨節痠疼右甚乃陽明虛無以束骨利機關也擬通養法參鬚石菖蒲各一錢茯神絡石各三錢薏苡四錢仙夏竹茹各一錢五分木瓜八分薑汁炒黃連三分十大功勞一兩仲冬招余往遊復視則諸恙皆安惟右腿尚疼耳即於通養方內加黃柏仙靈脾服之遂愈王西翁令孫芝生茂才室久患汛行太速頭痛神疲形瘦內煩渴喜熱飲納食滯膈絡脹少眠脈至軟滑虛弦腿痠而有赤塊甚痛乃陰虧水不涵木風陽內熾氣鬱痰凝議宣養清潛互用法沙參六錢鱉甲八錢首烏三錢茯神菊花各二錢梔炭竹茹桑葉各一錢五分白薇黃柏絲瓜絡各一錢以藕二兩十大功勞一兩煮湯煎藥外用蔥白杵爛蜜調塗腿上赤塊仲冬復視煩減能眠汛行較緩頭疼腿塊均已漸瘥乃與通補柔潛之劑後信來知其服甚效鴛湖吳君小漁令寵數年前因娩後啖生菜而患便瀉久治不愈仲秋余視之脈弦數曰此非菜之罪也乃土受木乘而頻年溫補益廣病機頭痛帶多脘疼食少吐酸痰嗽五熱無眠無非八脈無權風陽偏盛授宣養清潛之法而愈繼其令妹適嶽氏者久患帶下去冬崩血赤白並行延今不已臥榻數月僉云無生理矣余診脈甚滑數面赤口乾因問足冷乎溲熱乎耳鳴無寐乎向來輒服溫補乎皆曰然幸能安穀是藥病也幸澀之不止藥力尚有分勢也投以大劑清熱堅陰之法服數十劑仲冬余復遊禾已能踵寓就診矣秀水吳君小漁年近七旬平昔善飲久患便瀉帶血日夜十餘次溺不單行廣治罔效聘余往視脈虛以弦用補中益氣湯去歸柴加烏梅黃柏白芍茯苓不十劑而痊其季郎雅軒素有失血之患近由穹窿山歸途次發熱兼以咳逆見血醫治兩旬不應余診之脈弦數而上溢氣衝則自覺血腥喘汗睛紅面黧足冷飢不能食脅痛耳鳴苔膩口乾小溲短赤寤不成寐痰色甚濃乃稟賦陰虧水不涵木心火內熾肺金受戕兼感客邪胃濁不降甚難措手即欲辭歸而虞君梅亭胡君春田力乞疏方勉圖一二爰以沙參五錢蛤粉四錢冬瓜子六錢浮石茯苓石斛各三錢桑皮二錢竹茹枇杷葉各一錢五分絲瓜絡桃仁各一錢蘆根湯煎服是清心肝以靖浮越之陽肅肺胃而廓逗遛之熱也一劑脈色轉和氣衝亦減餘留七日返棹已熱退便行能安眠食惟不能慎口腹戒忿怒故痰嗽脅痛未能盡蠲逾二月余遊聞川過禾因喉痛復邀過診仍是心肝之火上炎為留三日與龔萍江茂才內外協治而瘥但病源匪淺情性不柔春令深時恐興險浪臨別與其友人餘姚岑君九鼎言之以為左券賢倡橋朱君蘭坡令堂年已六旬素患跗腫夏季患瘧轉痢痢止而腹之疼脹不休漸至脘悶面浮一身盡腫遍治罔效臥榻百日後事皆備聞余遊禾諄乞一診左極弦細右弱如無舌赤無津呻吟嘔沫不眠不食溲短目眵系肝旺之體中土受傷運化無權氣液兩竭如何措手勉盡人謀方用參鬚石菖蒲仙夏各一錢石斛冬瓜皮建蘭葉各三錢竹茹一錢五分薑汁炒川連四分陳米湯煎服詰朝蘭坡欣欣然有喜色而相告曰已轉機矣求再診余往視面浮已減病者囅然曰胸腹中舒服多矣故不呻吟且進稀粥按脈略起遂於原方加冬蟲夏草一錢烏梅肉炭四分服後連得大解色醬而夾蠕蠕之蟲盈萬腹之疼脹遂蠲肢腫亦消舌潤進粥又邀余診色脈皆和喜出望外初亦不知其蟲病也所用連梅不過為泄熱生津柔肝和胃之計竟能暗合病情殆蘭坡孝心感格故危險至是可以一二劑取效謹識之以見重證不可輕棄而余僥幸成功實深慚恧將返棹留與善後方惟加燕窩根薏苡白蒲桃干而已冬初余再遊禾詢其所親云已出房因索原方案歸録之邱氏婦年四十餘患少腹瘕聚時欲上衝昏暈而厥臥榻數月足冷麵紅寤不成寐諸治不應余按脈虛細而弦口乾無液與大劑一貫煎覆杯即愈人咸詫異稱神余卻愧抄來墨卷也秀水嚴小亭令正五十八歲因數年前家有訟事屢遭驚嚇而起輒疑自欲吞金雖己衣不敢用鈕扣並時縶手足即夫媳兒孫皆屏絶不許入房云恐自摘他人之衣扣環飾咽下也僅留一媼在室服侍而飲食起居如常人醫皆謂其神虛率投鎮補今秋患右腿青紫腫痛牙齦臭腐季秋延余視之脈弦滑而數曰此病不在心而在膽故能記憶往事而善謀慮豈可指為神志不足乎膽熱則善疑愈補則熱愈熾熾極則傳於胃胃熱蘊隆乃成青腿牙疳也錮疾已六七年宜先治其新病以菖蒲膽星石膏膽草知母元參銀花梔子白薇竹茹黃連煎調玉樞丹並令購白馬乳飲之六劑而病減半月新病愈仲冬余又遊禾復診脈較平而膽亦稍和蓋白馬乳善清膽胃之熱也朱君慶雨次郎夙有癇證因勞傷之後發冷吐酸不飢神憊服藥數劑遂致故恙日作數次醫者技窮餘脈之弦細若伏而肢冷如冰苔白如砂涎沫頻吐頭疼而暈重裘不知溫是熱深厥深誤投熱藥而飲邪內盛故熱邪隱伏不顯也詢其小溲果甚赤以導痰湯去草合雪羹加芩連梔茹木通煎吞當歸龍薈丸覆杯而愈管君錫棠仲郎蘭谷之室季秋患寒熱娠已八月矣繼因其子患驚憂勞數月遂兼痰嗽而舌糜口臭服藥數帖而娩其胎已腐然寒熱咳嗽口糜諸恙不減醫以其産後也用藥益無把握馴致氣逆自汗面赤無眠束手囑備後事矣適余遊武原歸延診其脈寸關弦滑右大惡露流通二便無阻是下焦無病雖在産後而病與産後無涉若云産後宜溫固是謬説而此之口舌糜臭亦非大熱毋庸重劑涼解良由胎已早殞失於早下以致濁氣熏蒸於肺胃故見以上諸證既見諸證而早為肅清則源澄流潔奚至是耶設再誤作産後虛喘而妄投補劑則雖死而莫知其所以死也爰以南沙參省頭草厚朴杏仁菖蒲桑皮竹茹枇杷葉冬瓜子絲瓜絡為方薔薇葉蘆根煮湯煎服兩劑氣順嗽蠲知飢進谷去杏朴加苡仁甘草口舌隨愈寒熱亦休惟骨節痠疼合目即汗改清熱養陰而起榻腰足尚痠軟授滋補氣血而痊管授青翁季郎蓉舫之室初冬患寒熱耳聾胸悶便祕帶下如注嘔渴不眠粒米不沾者旬余矣人皆危之余按脈弦數舌絳無苔氣逆面紅自求速死此肝鬱深沉木火內爍耗津阻氣出入無權小柴胡湯逍遙散皆貌合而神離誤施必然決裂此辨證用藥之所以難也幸其喬梓深信遂以小陷胸加菖茹旋覆梔芩蘆根湯煎服一劑胸漸舒氣漸平再劑稍寐三劑嘔止進粥五劑便行溺暢寒熱亦休苔布知飢始改柔養而瘳金氏婦自仲夏墮胎迄今四月有餘惡露淋漓不斷兩臂近復患瘡渾身膚癢脈數而弦多藥罔效亦為産後宜溫之謬説所誤也用西洋參銀花各二錢生地龜版各四錢冬瓜皮三錢梔炭竹茹各一錢五分白薇青蒿黃柏各一錢甘草六分不十劑愈矣沈君雪江令嬡黎里徐少岩刑部之媳也胎前患瀉娩後不瘳半載以來諸藥莫效余按脈弦數而尺滑詢知帶盛口乾腰痠咽痛溲熱善噫肢冷畏煩乃肝熱而風行於胃液走則陰血日虧與白頭翁湯加餘糧石脂熟地龜版竹茹青蒿砂仁頻服而痊沈君云峰令正誕子後患身熱痰嗽白㾦頭疼腹痛便溏不飲口渴醫者治此礙彼專事模稜至九朝余抵禾視脈滑數苔微黃胎前感受冬溫也主以清解法或疑有礙便溏余曰便溏為肺熱之去路設便閉則將喘逆矣況夏間余嘗治其胎前溺澀群醫滲利而不應余專清肺而得手今雖産後體臟未更兼有客熱外侵所謂有病則病受也連服多劑果即向安仲冬余遊姑蘇有長洲朱姓患久瘧求診面腫目黃聲音不爽溲赤腹脹脈滑而弦濕熱蘊隆失於宣解苔膩無汗食少痰多與清化方囑其慎口腹戒甜膩渠云此間名手皆曰藥餌之外須日飲糖湯庶久瘧易愈余曰渠但知表散可以發汗解邪糖湯可以和中已瘧而愈散愈不解愈和愈不已者是執死法以限活病也再信其言必成瘧臌病人聞之悚然亟服余方數帖得汗而愈秀水懷某三十五歲自春前偶失血一日嗣即頻發所吐漸多延至季冬聘余往視左脈虛弦而數右軟大氣逆自汗足冷麵紅夜不成眠食不甘味音低神憊時欲嘔酸此由心境不怡肝多怫鬱而脈候如斯有氣散血竭之虞堅欲返然既邀余至不得不勉寫一方聊慰其意而病者強作解事反以所疏舒郁之品為不然執意要用五味山萸薑桂之類性情剛愎此病之所由來而執迷不悟更為速死之道矣既而其妻出診脈至弦細頂癬頭疼心悸帶多不飢五熱亦是水虧木旺退而謂其所親曰茲二人何郁之深耶始知其無子欲買妾而妻不許遂以反目成病及病成而妻乃憂悔交縈因亦致疾此與曩視省垣顧金城之病同因家擁巨資故壯年即慮無子亦可謂欲速不達矣而愚婦不知大計徑為一妒字以致潰敗決裂此時雖亟為置妾亦無濟矣即以身殉亦何益乎録之以垂炯戒一少年久患內熱鼻衄齦宣溺赤便艱睛紅口渴熱象畢露因陽萎經年醫者但知為陽虛之證而不知有因熱而萎之病遂進溫補其熱愈熾父母不知為之畢姻少年大窘求治於余脈滑而數曰無傷也與元參丹皮知柏薇梔石菖蒲絲瓜絡沙參蛤殼竹茹服六劑來報昨夜忽然夢遺余曰此鬱熱泄而陽事通矣已而果然娼女榮瑛就診於余自述本良家子十四歲而天癸至二十二歲而適人二十五歲初産但覺腰腹微痠子即墮地三十二歲再産亦爾茲又嫁二夫向不自乳而産育漸頻分娩漸慢今春誕子為第十胎腹痛逾四時而始生在他人猶以為極快而我已覺漸徐且年雖五十天癸不衰錮疾全無向不服藥素有微帶邇年漸無惟每日吐痰別無他苦恐此後有難産之虞求為設法余聞而訝之其貌雖不甚都而粉黛不施風致嫣然肌膚尚似三十許人真尤物也始信雞皮三少之説為不誣按脈六部皆緩滑而長左寸關帶弦數是聰明有壽之徵故年愈長而氣愈固是以分娩漸慢也向有帶而近有痰以左寸關合之火搏其液而不下趨也囑以六君子加減為常服之方設再孕至七八月以束胎飲頻服可期易娩渠聞之欣然受方而去録之以見賦體之奇余口上齒下牙密排各十六雖從無痛楚而自幼不能決硬物故侵晨必以鹽擦而冷水漱之無間寒暑今年春夏以來飯食日減右之第六齒漸不能嚼偶觸堅韌之物痛不可忍且畏冷漱以為去年一病遂形衰象初不介意余天性不飲而頗識杯中趣曩侍先慈晚膳輒陪一二杯因去冬苦絡虛不能轉側戚友咸勸日飲醇酒數杯以和氣血遂習以為常然不敢縱肆未嘗一醉也十二月十八夜寐中忽為右齦痛覺詰朝即礙於飲食而是日已訂有青鎮之遊遂攜一針登舟頻刺痛處出血不少午後漸鬆次日歸飲食如常以為無患矣二十一日立春晨起痛脹復作刺亦不應繼以凜寒身熱偏右之巔額頞䪼顴頰頤頦無不掣痛苔色未露謂是風火外侵用艽翹蠶芷桑薄等二劑惡寒雖已而足冷麵熱溺赤苔黃且鼻竅不塞而右流濁涕如膿時欲哼而出之不則自上齶流下臭苦不堪右面盡腫滿口唇瘡腫處極其畏寒須以熱物尉之為快而時時火升自問素不服丸散又不啖肥甘的系飲酒經年濕熱久蘊而上熏蓋以酒之熱歸於膽上移於腦則為鼻淵其實移腦者即移胃也故見證皆在少陽陽明分野遂以元參桑葉菊花花粉銀花枳椇子絲瓜絡冬瓜子蘆根為劑和入蘆蔔汁調以玉樞丹兩服而苔化火平二便亦暢外用鹽滷熱洗右面而腫漸消去玉樞丹又二服可以嚼飯日啖北梨至戊午元旦而臭濁之涕始稀初五六連日出門適大風初七日午後右齦復痛上連頭角耳門右之第六齒復長出而礙食凜寒畏風乃用桑葉菊花生甘草緑豆皮元參苡仁銀花梔炭薄荷鉤藤以清散風熱一服腫出痛減去薄鉤加枇杷葉四劑痛平而右之第六齒已內外分裂矣其根仍固但礙於嚼物而齦腫直至夏初消盡既而頭面四肢遍發斑塊瘰疱腫而且癢遊行無定手十指足十趾兩手掌兩足心無處不到用力搔之微出紫血結痂堅黑痕如痘疤至秋杪始痊癢時以鹽滷洗之內服銀花緑豆生苡仁湯戒口腹者八閲月嘻酒之為害如此深愧悟之不早從此一滴不敢沾唇憶二十年前海豐張雨農司馬招遊東甌臨行妹嘗戒余勿飲酒佩不敢忘故向無酒病年來自問衰頽稍爾放溢遂釀此恙幸而資格尚淺藥治未誤不致延成錮疾蓋天性不飲者雖少飲亦能為患也詳録之以為世鑑余妹天性孝友又極賢明幼佐先慈操井臼理家務有北宮嬰兒之志余強之適金氏十載而嫠余深悔之附録以志余過余襁褓時患瀉經年逮三歲種痘而痘科不知其天花已將出也復以苗助之遂及於險先慈抱而膝行於床者五晝夜賴任六嘉先生救全因而體氣甚弱童年畏勞稍動即鼻衄故恆靜坐十二歲夏間患溫甚劇父母深憂之病中見諸神將相謂曰此一路福星也遂醒而汗出以瘳失怙後遠遊於婺遵母氏之訓諸凡謹慎弱冠後衄病始痊隆冬可不挾纊但略犯生冷即便瀉偶食炙爆則咽痛己丑受室甲午舉家患疫悉余治愈既而自病甚危夢一淡妝中年婦人持合貯紅藥一丸以藥納余口中而去乃大汗而寤口中尚有藥香病即已復因作勞太早倏然暈去余妹甫十七歲泣禱於天欲刲股以救而余已蘇妹因卒嚇遂吐血至今思之愧無以報也嗣後冬始衣絮壬寅病痁熱盛時夢日月並麗於天而有帶下垂余手挽兩帶而撼之日月皆動遂驚醒出汗而愈丙午酷熱而酬應甚繁始患滿額暑瘍續患痢又患瘧熱時輒夢御風而行告愈之時凌虛上至霄漢忽墜淵一浴汗出如湧而蘇丁未續娶己酉夏錢塘沈悅亭茂才邀視陳茂才疫證勢已垂危余初不知其兼患黴瘡也略不經意吸其穢毒歸而即病雖服故孝子張君養之之藥而愈時夢身化異類遍體鱗甲遊泳深淵騰雲而上適雨聲如注而覺汗如沐雨而天雨竟數日不止江浙因以成災亦奇矣哉此後始衣帛乙卯挈眷回籍丙辰秋杪病於省寓十月初六夜夢法華山備冠服輿從迎余赴職余即欣然冠帶而去出錢塘門過昭慶寺見老少婦女數百人持香攔阻因停輿巳而東嶽傳令送歸余遂返寓甫到門一跌而寤此夢則更奇也究不知後來何如嗟乎幸而免者屢矣附録於此以存夢境
