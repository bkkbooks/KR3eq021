body:
  text: 卷二問丹溪謂人身陰不足景岳謂人身陽不足君以為孰是余曰人身一小天地試以天地之理論之陰陽本兩平而無偏也故寒與暑為對待晝與夜為對待然雨露之滋霜雪之降皆所以佐陰之不足而制陽之有餘明乎此則朱張之是非判矣周公謹云北齊高緯以六月遊南苑從官暍死者六十人見本紀而通鑑書曰賜死賜乃暍字之訛耳綱目乃直書曰殺其從官六十人而不言其故其誤甚矣尹起莘巧為之說曰此朱子書法所寓且引孟子殺人以梃與刃而政之說固善矣然其實通鑑誤之於前綱目承之於後耳緯荒遊無時不避寒暑於從官死者尚六十人則其餘可知矣據事直書其罪自見何必沒其實哉余按暑暍殺人自古為烈而儒者既誤以暍為賜醫者又妄以暑屬陰幾使卒死於暍者冤無可訴葉天士先生嘗云熱地如爐傷人最速可謂要言不煩足以喚醒後人宋逸士劉卞云人多以嗜欲殺身以貨財殺子孫以政事殺百姓以學術殺天下後世吾無是四者不亦快哉愚謂學術殺天下後世醫書亦其一也著術家當何如兢兢乎蠡海集云觀心字之義大有旨哉其為象也左點以配木右點以配金在上之點微撓而尖銳以配火在下則曲鉤而撓起以配水蓋元武之神二物在下之象為多腎亦二枚也此四行豈不親切乎土亦寄下以水土同行耳又云五行五氣死中有生之義存如耳為腎竅屬子陽金死於子而陰金生焉鼻為肺竅屬酉陽火死於酉而陰火生焉是以耳能司聽鼻能司臭也愚謂鼻塞治心耳聾治肺亦本此義又云北斗位北而得七為火之成數南鬥位南而得六為水之成數此乃陰陽精神交感之義也日生於東乃有西酉之雞月生於西乃有東卯之兔此陰陽魂魄往來之義也人身之肝位在於右而脈診卻見左手脾位在左而脈診卻見右手此亦陰陽互藏其宅之義也又云男子之氣始於子子在下起坎為男而位北也故男子氣鍾於外腎外腎者督任二脈之交也女子之氣始於午午在上起離為女而位南也故女子氣鍾於兩乳者肺肝之脈始終也雷艾陵精理學嘗云欲亦原於天舍欲不能獨為理天有理有氣人得其理以成性得其氣以成形有形而有欲性即天之理而欲者天之氣也飲食男女人之大欲存焉使無飲食男女之欲則無所謂邪又安有所謂正而理亦無從附以見又何殊於釋氏絕色聲香味而歸於虛無寂滅之道哉愚謂聖賢教人不過窒欲節欲寡欲而已強人絕欲則不近人情矣艾陵所言真通儒之論星甫野語云廬江姬氏婦母女皆無穀道便遺悉由前陰而不害生育其女嫁後婿家欲退婚而涉訟邑宰劉公為干據其母供麾令入內室夫人質驗而訟遂息劉判有尾閭偶闕無虧種玉之田云云愚謂此異稟也昔所未聞故錄之四庫全書提要謂魏氏續名醫類案網羅繁富變證咸備惜編次潦草不免蕪雜愚按此書十一卷瘧門陸祖愚治陳雅初案後云己丑長至後一日錄是案嗣考仁和胡書農學士先友記云魏君沒於乾隆壬辰然則以六十卷之書僅三年而蕆事雖極敏捷殆不過草創初就耳倘天假以年重為刪定斷無以上諸病矣茲錄拙校數條博雅正是卷四中寒門按語余有凌二官案可參愚嘗通部展閱並無凌二官之案恐即熱病門凌表侄案耳前後稱謂不一如何參考其為初創草稿而非定本也灼然可見厥門後二條是魏案凡屬外淫皆曰感證魏氏所編雖首列傷寒瘟疫二門而風溫濕溫闕然未備乃於第六卷列感證一門殊為含混蓋外感頗疏也楊氏子至宋復華各案皆其治驗率內傷挾感耳魏氏謂傷風誤表多成勞損諄諄致戒愚謂此特其一面也亦有因邪未清而誤補以成勞者雍乾間歙人吳澄字師朗者著不居集一書專論外損自成一家雖用法未盡善而其言不可廢也本門末條是魏案熱病門喻案面足浮腫云云魏氏謂面腫可云足腫則未確終是血不配氣耳愚按肺主一身之氣而皮毛者肺之合也感證後氣復而血虛足腫者固有之而餘熱不清肺氣壅滯者則尤多也觀燥門趙我完次子案可知若胃熱不清則津液不復經云胃不和則臥不安也又耳閉宜清肺與耳鳴宜滋腎者有殊至脾胃分別論治尤為開千古之群蒙葉天士深得力於此而為靈胎潤安所折服乃魏氏一概非之何耶惟痢以下多而亡陰瘧以汗多而耗液二語最精確凌表侄一條是魏案火門石頑治張太史虛火證魏評極是嘔門自鮑綠飲以下皆魏案瀉門自宋復華以下皆魏案但復華之病似肝木乘胃故潤藥相宜如果乘脾則參術是要藥矣瘧門施渙之許懷民二條皆魏案此門治法於暑濕時瘧闕焉未及惟繆氏解用白虎以治暑證而乃初病即雜以牛膝首烏等陰分之藥皆未可為軌則也胎瘧之稱尤為不典魏君博雅胡亦惑之痢門自張龍文以下皆魏案痢後風末一條是魏案第此案宜入瘧痢門消門胡天敘條是魏案黃疸門自徐環薇以下皆魏案內傷門末二條皆魏案吐血門末三條皆魏案衄血門末二條皆魏案便血門趙正為室人條系魏案痿門按語云此證為肝經燥火鬱於脾土而成世罕知者此誠不刊之論所附黃澹翁案未見蓋此書脫誤甚多也馮楚瞻治李主政案議論極精治法未盡善而馮氏最為柳洲所心折故不覺推許過當也末兩條皆魏案膈門陳溶上以下皆魏案末條竟是一篇祭文喘門葉石林家喘延四世而愈病之藥不同夫一脈相傳病情尚爾世之執死方以治活病而不察其臟性病因之各異者皆盲醫也末四條皆魏案呃逆門末條是魏案汗門自詹渭豐以下皆魏案面病門後二條注云自來選鈔入不知誰案觀此則其書非魏氏一人輯選不過總其成耳且其中有注未入選而仍載入者可見為草創之稿而非定本蕪復脫簡宜乎不少目門自金封翁以下皆魏案耳門自朱餘二女以下皆魏案閱先生自述耳病之由士雄亦十四歲失怙而廢書服賈雖困苦顛連尚不致有疾者以母氏搘拄家事也讀此既感少境之與先生相似又恨學術空疏不能起老母之危疴為終身莫贖之罪涕淚交流為之掩卷鼻門自沈晉培以下皆魏案喑門自嚴鐵橋以下皆魏案脅痛門自範康候以下皆魏案腰痛門末條是魏案疝門末二條皆魏案五十九卷跌撲門詳列各證可云備矣而二十八卷不知何以先著跌撲諸條此宜併入於後又二十八卷之小兒門皆鯁刺等病亦宜改標鯁刺為是二十九卷既列諸蟲複列蛔證蛔亦蟲也似可併入至文垣所治馬迪庵內人證魏氏病其議論不經夫伏痰挾火上衝蛔蟲因熱而動皆能使胸中跳躍熱降痰蛔並下則病自安未可厚非也中毒門劉立之治老婦案方法可謂神矣曷以知其服水銀竟不敘明何也如其煉餌當入丹石毒門設云誤服不能病至歷年奇疾門湖州鄔阿二所患乃蛇纏證非奇疾也當入外科門經水門徐範二條皆魏案崩漏門劉姚二條皆魏案妊娠下疾自汪陛堂以下皆魏案妊娠虛損姚胡二條皆魏案喻氏治李黃二案笠澤治吳元水婦案皆不當列於心腹痛條至黃咫旭室病魏氏謂喻君不知肝胃病治法愚按柳洲獨擅此長云可概治諸證未免矯枉過正如吳元水婦病斷不可投以血藥者烏得專究肝腎而不問其餘耶歸地滯膈而作嘔乃氣分病之名論曷可非哉妊娠下血許胡二條皆魏案產難門末二條皆魏案胞衣不下門末條是魏案產後血崩自許竹溪夫人以下皆魏案產後血虛按語戒用薑附剛劑最為切貼以養營為先生獨得之心法也末條是其治驗產後火熱自沈協蘭室人以下皆魏案產後虛損愚謂此證最多何魏氏僅採溫補數案耶產後顛狂條忽自標魏玉橫治一婦云云前此各門所附己案皆不註明故餘一一點出庶讀者易知本門丁潤兄室條亦魏案凡各門自案皆附於後而此獨羼雜其間體例不符顯未編定也小兒傷寒袁仲卿子病喻云寒涼藥皆在胃口之上不能透入魏氏駭其何以上云鎮墜深入臟腑愚謂鎮墜之品性皆重降藥雖停於胃口邪則不能外解而深入矣用理中湯運轉前藥必以枳實等為佐此種意在言表之處皆須自有會心也小兒喘嗽條嗽字當刪以嗽證已列於前也小兒疳病末二條皆魏案五十二卷肺癰肺痿門止標一肺字脫下三字懸癰門魏案一條居首痃癖門魏案一條居中並宜移後五十八卷瘡瘍門吳性全案乃魏氏治驗但各門附案專滋肝腎豈生平得力於此而欲獨豎一幟乎先曾祖重慶堂隨筆下卷所附洗冤錄人身骨節辨秀水莊芝階先生讀之謂尚有未是處因以襄平姚立齋大尹所著洗冤錄解示余據歷驗多案方骨下之尾蛆骨名曰尾閭一名骶端一名窮骨一名橛骨俗名尾樁實尾骶骨之末節無竅無髓或如菱角或如人參蘆有連生於方骨下者有與方骨斷而連者原不足異而與現行檢骨格所言男子九竅女人六竅實不符也又云女子羞秘骨為洗冤錄補附會之說余檢女骨從未見也詢之同官亦無見者且據老仵作云婦人產子則交骨開若有羞秘骨則不能開矣蓋架骨前胯青黑者多有生前患瘡或服金石毒藥使然故踢傷致死條有此骨切不可檢恐誤認青黑為傷云云豈有因搆精而致骨青黑之理哉況舍一而起於二尤為必無之事若曰天理以此辨貞淫則婦人再醮不得謂之淫處子外遇安可謂之貞苟不辨正則婦女之下部受傷而死轉致汙其名節者豈不大可慘哉愚謂推勘最細而人身說概全體新論諸書皆不言人有羞秘骨余方疑矣閱此始釋然亟錄之以志余陋太平戚鶴泉集中有書漢張太守仲景碑陰文一首因錄於下俾後世咸知醫聖之當敬也其文曰南陽漢張太守仲景墓碑載太守涅陽人為今南召故隸南陽墓久淪沒無有知者崇正戊辰夏蘭陽諸生馮應鰲病恍惚見神來稱故漢長沙太守某為療囑應鰲為修某處墓應鰲既愈依所指南陽城東祠後七十步跡至祝縣丞園境宛然顧不見墓形向祝求尺寸地為太守封樹祝以無驗呵斥之應鰲計無所出立石祠中記其事而歸後三年有人於園穿井見石碣果太守墓會寇亂應鰲雖聞信不能往也國朝戊子應鰲選南陽郡屬葉縣校乃親至其地已自祝而包而楊三易主驗葬處雖實墓猶在荒坎中具始末陳於府出金市楊地重甓甃並建墓祠參議桑公芸為碑記噫如碑言太守靈甚著矣顧不示於南陽近地必假之甚遠之馮生又千餘年不一顯必遲至有明將易代之際雖顯晦有時理固有難解者而卒使遺蛻所存不終沉沒林廟蔚然令後人過而生敬則事確有實而言之非誣嗚呼太守功在萬世當報者豈特馮生而靳尺寸地不一封樹如祝縣丞又安在哉長洲沈歸愚尚書香岩先生傳云君名桂字天士號香岩先世自歙遷吳諸生嶐山公曾祖也祖紫帆有孝行通醫理至君考陽生而精其術範少參長倩無子晚得伏庵太史生無穀道啼不止延醫視之皆束手陽生翁至曰是在膜里須金刀割之割之而穀道果開太史既長為紫帆翁作傳以報焉君少從師受經書暮歸陽生翁授以岐黃學年十四翁棄養君乃從翁門人朱君某專學為醫朱君即舉翁平日所教教之君聞言即徹其蘊見出朱君上因有聞於時君察脈望色聽聲寫形言病之所在如見五臟癥結治方不執成見嘗云劑之寒溫視疾之涼熱自河間以暑火立論專用寒涼東垣論脾胃之火必務溫養習用參附丹溪創陰虛火動之論又偏於寒涼嗣是宗丹溪者多寒涼宗東垣者多溫養近之醫者茫無定識假兼備以幸中借和平以藏拙甚至朝用一方暮易一劑而無定見蓋病有見證有變證有轉證必灼見其初終轉變胸有成竹而後施之以方否則以藥治病實以人試藥也持論如是以是名著朝野即下至販夫豎子遠至鄰省外服無不知有葉天士先生由其實至而名歸也居家頓倫紀內行修備交朋友信人以事就商為剖析成敗利鈍如決疾然洞中窾會以患難相告者傾橐拯之無所顧惜君又不止以醫擅名者沒年八十配潘孺人子二奕章龍章奕章亦善醫以君名掩孫二人曰堂曰堅曾孫三人習儒業食君之德高大家聲將於是乎在論曰自太史公傳倉公件系其事陳承祚作華佗傳因之後戴九靈宋景濂仿其體作名醫傳君不欲以醫自名並不欲以醫傳世臨末誡其子曰醫可為而不可為必天資敏悟又讀萬卷書而後可借術濟世不然鮮有不殺人者是以藥餌為刀刃也吾死子孫慎毋輕言醫嗚呼可謂達且仁矣隨園先生與薛壽魚書云談何容易天生一不朽之人而其子若孫必欲推而納之於必朽之地此吾所為悁悁而悲也夫所謂不朽者非必周孔而後不朽也羿之射秋之奕俞跗之醫皆可以不朽也使必待周孔而後可以不朽則宇宙間安得有此紛紛之周孔哉子之大父一瓢先生醫之不朽者也高年不祿僕方思輯其梗概以永其人而不意寄來墓誌無一字及醫反托於與陳文恭公講學云云嗚呼自是而一瓢先生不傳矣朽矣夫學在躬行不在講也聖學莫如仁先生能以術仁其民使無夭扎是即孔子老安少懷之學也素位而行學孰大於是而何必舍之以他求王陽明勳業爛然胡世寧笑其多一講學文恭公亦復為之於余心猶以為非然而文恭相公也子之大父布衣也相公借布衣以自重則名高而布衣挾相公以自尊則甚陋今執途人而問之曰一瓢先生非名醫乎雖子之仇無異詞也又問之曰一瓢先生其理學乎雖子之戚有異詞也子不以人所共信者傳先人而以人所共疑者傳先人得毋以藝成而下之說為斤斤乎不知藝即道之有形者也精求之何藝非道貌襲之道藝兩失燕噲子之何嘗不託堯舜以鳴高而卒為梓匠輪輿所笑醫之為藝尤非易言神農始之黃帝創之周公使塚宰鎮之其道通於神聖今天下醫絕矣惟講學一流轉未絕者何也醫之效立見故名醫百無一人學之講無稽故村儒舉目皆是子不尊先人於百無一人之上而反賤之於舉目皆是其中過矣即或衰年無俚有此附會則亦當牽連書之而不可盡沒其所由來僕曾疾病性命危篤爾時雖十周程張朱何益而先生獨能以一刀圭活之僕所以心折而信以為不朽之人也慮此外必有異案良方可以拯人可以壽世者輯而傳焉當高出語錄陳言萬萬而乃諱而不宣甘舍神奇以就臭腐在理學中未必增一偽席而方伎中轉失一真人矣豈不悖哉豈不惜哉故人沈君辛甫端恪公曾孫也嘗病吳鞠通混疫於溫余謂不但此也其條辨首列曰溫病者有風溫有溫熱有溫疫有溫毒有暑溫有濕溫有秋燥有冬溫有溫瘧凡九項似無遺義而不自知其題旨未清也夫冬傷於寒至春而發者曰溫病夏至後發者曰熱病冬春感風熱之邪而病者首先犯肺名曰風溫其病於冬者亦曰冬溫病於春者亦曰春溫即葉氏所論者是也夏至後所發之熱病在內經亦曰暑以其發於暑令也故仲景以夏月感暑成病者名曰暍蓋暑暍者皆熱之謂也今杜撰暑溫名目最屬不通至於疫證更不可與溫熱同治當從吳又可余師愚兩家為正鵠而溫之為毒為瘧乃溫之節目矣概而論之宜乎愈辨愈不清矣其次條云凡病溫者始於上焦在手太陰嘻豈其未讀內經耶伏氣為病自內而發惟冬春風溫夏暍秋燥皆始於上焦若此等界限不清而強欲劃界以限病未免動手即錯矣夫溫熱究三焦者非謂病必在上焦始而漸及於中下也伏氣自內而發則病起於下者有之胃乃藏垢納汙之所濕溫疫毒病起於中者有之暑邪挾濕者亦犯中焦又暑屬火而心為火臟同氣相求邪極易犯雖始上焦亦不能必其在手太陰一經也第四條云太陰風溫溫熱溫疫冬溫初起惡風寒者桂枝湯主之夫鞠通既宗葉氏當詳考葉氏論案以立言如指南溫熱門第三案云溫邪上受內入乎肺肺主周身之氣氣窒不化外寒似戰慄其溫邪內郁必從熱化風溫門第五案云風溫入肺氣不肯降形寒內熱乃膹郁之象用藥皆是辛涼輕劑至幼科要略論三時伏氣外感尤為詳備於春溫證因外邪引動伏熱者必先辛涼以解新邪自注用蔥豉湯垂訓昭然何甘違悖意欲紹述仲聖乎則祖上之門楣不可誇為自己之閥閱也在涇先生云溫病伏寒變熱少陰之精已被劫奪雖有新舊合邪不得更用用桂枝湯助熱而絕其本也豈吳氏皆未之聞乎中焦篇第一條自注云肺病逆傳則為心包上焦失治則傳中焦始上焦終下焦嘻是鞠通排定路徑必欲溫熱病遵其道而行也有是理乎彼犯肺之邪若不外解原以下傳於胃為順故往往上焦未罷已及中焦惟其不能下行為順是以內陷膻中為逆傳章虛谷亦昧此義乃云火來剋金而肺邪反傳於包絡故曰逆夫從所勝來者為微邪胡可反以為逆豈二公皆未讀難經耶其不始於上焦者更無論矣書名溫熱條辨而所列霍亂皆是寒證故餘年少時輒不自揣而有霍亂論之作也沈辛老云鞠通書藍本葉氏有前人未見及而補之者如秋燥增入正化痙瘛別為兩條談理抑何精細有前人已見及而忘之者如霍亂證自具暑濕門岫云未經摘出而伊遂不知有熱疝氣條當分暴久治香岩先生業已道明而伊又惟知有寒蓋心思之用固各有至不至雖兩間亦缺陷世界而況人乎又曰鞠通所云之疝多系暴證而久者又系宿瘕病故可一以溫下取下若疝雖有歷久不痊然聚則有形散即無形初非真有物焉如瘀積腹中也又云乾霍亂以生芋杵汁下咽即生遠勝鹽湯探吐也暑瘍初起用絲瓜杵汁塗或荷花瓣貼之皆妙不必水仙根也中焦八十四條云少陽瘧如傷寒證者小柴胡湯主之此與溫熱何與而乃闌入乎辛老云葉氏知暑濕時瘧與風寒正瘧迥別融會聖言惟從清解所見甚超而洄溪反以不用柴胡屢肆詆訾食古不化徐公且然況其下乎噫辛老長餘九歲與余交最深品學兼優真古君子也嘗為余校溫熱經緯而家貧無子今墓草宿矣遺稿未梓偶於拙草中檢得數條附錄於此亦可以見其讀書具眼立言忠厚也下焦篇之定風珠一派腥濁濃膩無病人胃弱者亦難下咽如果厥噦欲脫而進此藥是速其危矣二十四至二十六條皆冬寒內伏春溫初發之治乃妄謂溫熱溫疫自上中傳下之治豈非夢囈四十二條自注謂宋元以來不明仲景一書專為傷寒而設吳氏直未讀傷寒論也注傷寒者無慮數十家皆以為專論傷寒之書故恆覺支離附會考論中風寒溫暍濕五氣為病古人皆曰傷寒故難經云傷寒者有五而仲聖以傷寒名其書也此等大綱不清豈可率爾著書五十一條痰濕阻氣之陰吹證實前人所未道及五十五條發明蠶砂功用何其精切故余治霍亂以為主藥也吳氏此書不過將指南溫熱暑濕各案穿插而成惜未將內經難經傷寒論諸書溯本窮源即葉氏溫熱論幼科要略亦不匯參故雖曰發明葉氏而實未得其精奧也至採附各方不但剪裁未善去取亦有未當此余不得已而有溫熱經緯之纂也後三卷雜說解產難解兒難等篇皆可傳之作遠勝三焦條辨多矣雜說中惟霍亂不得吐瀉治以苦辛芳熱一語為可議條辨中可議處甚多姑舉大略如上庶讀者勿隨波而逐流也陰吹乃婦人常有之事別無所苦者自亦不知為病況系隱微醫更不知相傳產後未彌月而啖蔥則有此不可謂為病也惟吹之太喧而大便堅滯者或由腸燥或由瘀阻或由痰滯以致腑氣不通而逼走前陰也然亦但宜潤其燥化其瘀宣其痰不必治其吹也轉女成男之說自古有之而驗者甚少錢塘沈君西海云有一法每試有效且甚簡易若停汛而確知為孕即取紅紙一張本夫親書五更露結桃花實二月春生燕子巢十四字於上書時心中默誦無思也無為也寂然不動感而遂通四句書畢貼於臥床內隱處凡書時貼時均勿令人見並勿令人知驗後始可傳人也黃錦芳云杜仲續斷二味舉世用以安胎而不知續斷味苦專入血分活血消腫故乳癰癥結腸風痔瘻金瘡跌僕一切血瘀之證皆可用也雖稍有澀性行不至泄然誤施於氣弱氣陷之婦則順流而下奔迫莫御而有排山倒海之勢豈區區澀味所能止其萬一者乎杜仲色紫而潤辛甘微溫性專入肝補氣強筋筋強則骨亦健凡腎虛腎寒腳弱之病用之最宜若氣陷氣弱之輩斷不可服以其性最引氣下行而無上升堅固之意也夫胎墜本忌血行氣陷其服此二味亦有奏效者以人身氣血貴乎溫通胎墜之因不一亦有因腎氣不溫經血凝滯而胞胎失蔭者得此二味則氣煦血濡不滯不漏而胎自安矣止為下虛上實者設也故胎墜而尺強寸弱者動作少氣者表虛惡風汗時出者心下懸飢得食則止者一身之氣盡欲下墜者皆在禁例奈作俑者既不分辨明晰流傳既久遂以為安胎聖藥總緣醫理不明藥性不曉證候不知見方號為神驗雖滑脫之婦亦爾通用豈知杜仲續斷原或因於跌僕或下寒挾瘀而胎動者之妙劑苟不知審顧區別而妄用之則不但不能安胎反能催胎墜胎甚有殞其母命者可不戒哉愚按此二藥余不甚用而世人皆視為補益之品得黃氏此論自信管見之未昏婦人臨產世俗每慮其飢寒而不知飽暖以致難產治法匯云如飢宜食稀粥勿令過飽宜稍飢為佳以飢則氣下氣下則速產若食肉及多食或啖膩滯之物則礙於上焦氣不得下故產難雖產下而食滯中焦則生寒熱醫者不察亂投溫補多致危殆隆冬淺屋固宜遮蔽密實添設火盆若盛暑必擇清涼之所但須避風切勿過暖致生諸患如無涼室榻前可以新汲水盆貯映之明史載光宗諒暗鄭貴妃進美女四人上不豫內醫崔文升用大黃藥一日夜三四十起頭目眩暈不能動履楊漣疏劾之云有心之誤耶無心之誤耶有心則齏粉不足償無心則一誤豈可再誤上宣漣入目注久之方從哲薦李可灼進紅丸上飲湯輒喘藥進乃受上喜稱忠臣者再頃之傳聖體用藥後暖潤舒暢復進一丸明旦駕崩矣從哲擬旨賞可灼銀五十兩以王舜安疏改罰俸一年於是言者蜂起謂文升情罪不減張差而可灼次之並劾從哲從哲疏辨自請削奪可灼遣戍文升發遣南京愚謂此勝國三大案之一實千古之大疑案也論者紛紛迄未得其病情以文人多不知醫耳吾友仁和徐君亞枝嘗云李可灼進紅丸於光宗也先有奄人崔文升之用大黃故尤悔庵擬明史樂府有大黃一下法不治紅丸雖進補已遲之句其謂文升誤下固然矣而以紅丸為補則非是蓋光宗之病陽明實而太陽未罷之證也史載進紅丸後聖體暖潤舒暢則前此用大黃時必惡寒無汗周身拘急之證悉具大黃下之湯飲不受明是誤下成結胸之證紅丸者丸而色紅莫知所用何藥余意必是開太陽兼陷胸之品所以進後暖潤舒暢史載上不豫於進美女之下或太陽經府均病配紅鉛為經府雙解之劑故其丸色紅則仍是下法不是補法嘉言所謂得其下之之力非得其補之之力者也至於明旦駕崩或因小愈而復犯女色宮圍邃密外廷莫知不然豈有得暖潤舒暢之轉機未嘗變證而甫隔一夜遽然長逝乎因慨文人談醫每多謬誤如兩般秋雨庵隨筆載詠甘草云歷事五朝長樂老未曾獨將漢留候皆未讀醫書之故也愚謂雖讀醫書而閱歷未深者尚有人為書囿之弊故論病最非易事江陰陳定九留溪外傳載前明崇明蔡指方神於醫嘗云醫家心動氣浮志歧欲侈訛審察之微失參辨之宜而用藥舛謬未有不殺人於頃刻者也譬之良相治國必舉賢任能因材器使其心休休其如有容正己無私然後鼎鼐和陰陽燮而天下治如或心術匪端志向偏趨而用人失當欲求竣其功業終其令聞者鮮矣故曰為醫如為相用藥若用人醫道微矣非絕欲無私通神於微妙之鄉窮理盡性研幾於幽明之極者不足以傳也歙吳畹清太守世精外科以家傳秘法刊行壽世名攢花知不足方業外科者當奉為圭臬也又刻徐陳兩家易簡方四卷於蘇州其凡例首條云近來無論內外科一病就診先求多衍時日不肯使人速愈在有力者雖不惜費不知病久體乏受害端由於此至於貧病既不能一概送診務使早日痊愈方可自食其力若亦久延必至無力調治奄息待斃甚且因病廢業舉室飢寒忍乎不忍願行道者心存利濟力返積習定獲善報呂君慎庵所輯拙案三編卷二第六頁屠小蘇令正案後附顧氏子證蒙烏程汪謝城孝廉評云覆杯即已下宜刪去以言過當也若然則藜藿人溫證暑證亦可用辛溫矣此評甚是余極佩服第杭城之飲食起居甲於天下雖蘇揚不及也而席豐履厚人家之小兒往往愛惜過分因嬌養而生飽暖之疾亦甚於他處非深歷其境者不能悉知余發此論亦有為而言也故下文特著櫛風沐雨四字如果櫛風沐雨之人雖感溫暑似非一味清涼可治當稍佐以辛散始合機宜又結以量體裁衣勿膠瑟柱正慮印定眼目不敢說然也第二十二頁所用之交泰丸系黃連桂心二物呂君未注亦附及之曩武進董蘭癡鹺尹貢海門茂才四明項君新橋咸謂余為袁簡齋先生後身余聞之愧不敢當以袁公之聰明孝友政事文章焉能望其萬一不過性情通脫有相類耳定州楊素園明府云袁乃曠代之名醫也君之治胡季槎茂材發背案所引之語已括盡內外諸病治法無餘蘊矣而千古無人會意惟尊案不論用補用清悉以運樞機通經絡為妙用蘭癡諸君之說殆以此也余謂此愚者之一得偶合袁公之見耳至其集中論議無非入理深談愚每因彼而悟此事實有之緣人身氣貴流行百病皆由愆滯苟不知此雖藥已對證往往格不相入豈但不足以愈病已耶故錄存拙案不厭煩瑣諄諄以此告人設知此義則平易之藥輕淡之方每可以愈重證縱必死之病或可藉以暫緩須臾乃昧者謂餘妙術仁聲播於邇遐而病情千態萬狀多人苦思力索所不能中者君輒以平淡常用之品而得之毋乃醫運之亨乎余但笑而不答然清夜捫心慚無實學而虛名幸獲隱匿殊多遂伏處窮鄉欲期寡過惟癡腸未冷饒舌何辭嘻定有慧心人會吾意也余親家戴雪賓茂才之先德干齋先生精於醫行道四十年嘗云醫學一門顯則譬之有形之棋應變無方能者多而精者少隱則譬之無形之道神明莫測行之易而知之難可謂說盡此中微妙矣故先生年逾花甲即誓不臨證而樂善好施雖家無儲蓄亦不倦也壽至七十九而終山陰俞君仲華下方橋陳念義之高弟也人極豪爽有俠氣飲酒談兵輕財好客兼佞佛久寓省垣與余交最深惟談醫不合聞餘論景岳輒怒形於色余諒其信師過篤不與較也然遇時感重證必囑病家延余主治而其二子皆誤於溫補雖余與故孝子張君養之極口苦諫奈喬梓皆不悟和而不同如此也俞嘗撰結水滸演義一書又名蕩寇志尊朝廷以誅盜賊命意極正惜筆力遠遜耐庵且誤以扶陽抑陰之旨寓意於醫適形偏謬楊大令素園嘗著論非之夫以仲華之才之學談醫而猶走入魔道醫豈易言哉故錄之願後人勿輕言醫扶陽抑陰大易以喻君子小人章虛谷謂但可以論治世不可以論治病韙矣愚謂未嘗不可以論治病特扶陽抑陰不可專藉熱藥耳何也人身元氣猶陽也外來邪氣猶陰也故熱傷胃液仲聖謂之無陽醫者欲扶其陽須充其液欲抑其陰須撤其熱雖急下曰存陰而急下者下邪也下邪即是抑陰存陰者存正也存正即是扶陽苟知此義則易道醫理原一貫也趙養葵未明此義僅知溫補為扶陽之藥而不知陰陽乃邪正之喻故其法但可以治寒邪為病陰盛格陽之證也而乃書名醫貫以致後人惑之誤盡蒼生宜乎洄溪之力加呵斥也仁和許周生駕部云吳臺卿篤信乩言長齋禮拜忘其體之羸又受道士戒百日不語方夏暑火鬱肺遂病血而死因謂乩之術始猶一二好事者信之繼則樸實之士信焉繼則聰明之士亦信焉禍福以乩為筮學問以乩為師疾病以乩為醫背陽而入陰舍昭昭而即冥冥其幽陰沉墨足以消去人之精爽也愚謂更有因此而遭橫禍者歷歷可稽焉大抵惑於此者總由義利不明心有妄冀近日乩壇愈廣乩術愈新竟有不堪縷述者尤可嘆也艮齋雜說懲忿則火不上升窒欲則水不下泄水火既濟鼎道成矣君子讀損之象得養生焉疫癘傷人莫過於談往所云之崇正十六年有疙瘩瘟羊毛瘟等名呼病即亡不留片刻八九兩月疫死數百萬十月間有閩人曉解病由看膝灣後有筋突起紫者無救紅則速刺出血可活至霜雪漸降勢亦漸殺愚謂此疫雖奇殺人既速且多然無非暑熱毒氣深入營分耳故輕者刺之可活而霜雪降病自衰也考嘉興王肱枕蚓庵瑣語及桐鄉陳松濤災荒記事皆云崇正十四年大旱十五十六經年亢旱通國奇荒疫癘大作合三書而觀之則其為暑燥熱毒之氣可知呼病即亡者邪氣直入於臟也彼時設有餘師愚其人者或可救全一二也童栻廬云鎮海鍾景龍先生精於痧痘經其治者百不失一逆證決期從無爽日所用之藥初服大黃者十居其五後用補劑者十之七至於攻發惟殭蠶而已全蠍穿山甲桑蟲之類從未一施獨地龍遇血熱毒盛百餘條不嫌多嘗曰小兒血氣未充臟腑嬌嫩痘瘡不能起發良由元虛不能足漿漿不足則毒不泄若再以毒攻毒不但毒不肯出而正氣更受其害未有正虛而毒能化者也語簡理微真濟世之格言愚謂亦有因熱極而漿不起者以正氣為壯火所食也宜瀉火忌補托至痘後生毒多由妄投毒藥誤用溫補所致楊素園大尹云余見阜平趙功甫處方極輕嘗曰小兒之腹幾何須令其胃氣足以運化藥力始能有效亦至理也愚謂趙先生雖論小兒即大人之病亦須量其胃氣而後權方劑凡脆薄之人竟與小兒同視可也近世惟休寧汪廣期治小兒專用輕劑吾鄉管君榮棠少服賈天資穎異自知體弱恐不永年乃潛心於瘍科者十餘年遂精其術性慷慨施藥濟人能起危證與余為莫逆交丙辰季冬忽患吐血而亡年僅四十四子才五齡耳鄉人咸惋惜之余挽以一聯云頻年冷處存心施藥施糧共嘆君腸之熱一旦紅塵撒手斯人斯疾可憐兒口猶黃其沒前一月適余養疴在裡嘗攜酒餚見餉且以未完之稿示余曰癰疽之生昔人謂有三因其實從乳岩瘰癧之外無所謂內因也凡外感六淫先作內病如傷寒發汗不徹溫熱分解不清餘邪逗留為內癰為痞結為流注為附骨疽皆內有伏熱外被寒凝所致即胸背等癰亦由濕熱上升而成所謂營氣不從逆於肉裡發為癰腫若云陰虛火炎而生癰疽者千不得一總之瘍證不外氣血阻滯即損傷致病亦是血凝氣滯使然皆無補法至服藥之道原不過為富貴人設法以安其心耳斷不可通套徇俗如見焮腫而投內疏黃連毒必黑陷投犀角地黃舌必灰黑脾胃受戕變證因而蜂起但此義無論病家不知即醫家白首其間亦未悉原委迨證漸劇亦不自咎其用非所宜反謂病勢利害藥須加重雖至於死彼此不悟悲夫即諸家所刻治案抄襲雷同或各是其是各非其非無足取法若立齋輒用參附貧病則先傾其家而命即隨之矣且今世瘍醫不知治法但以書方為能事更造不服藥必遺毒為害之言以惑人推其意無非要譽以斂財不顧其人生死嘗戲改醉翁亭記二句云醫生之意不在病在乎斂財而已矣一笑自愧未嘗學問方劑藥性素所未諳然每治人之壞證均不從服藥中得手也余覽之欽其見道之深而所言皆得我心正欲析疑商榷不料其卒然溘逝天道不可尚矣亟為節錄如上以傳其人又云從來外科諸書圖形名狀設想於魚蟲鳥獸最是可笑如頭部之鱔𫋐頭螻蛄串唇部之龍泉疽虎髭毒手部之蛇頭疔蜣螂蛀腿部之上水魚泥鰍疽並無解說更不通者足跟之牛程蹇以人比畜近於謔矣醫者並不顧名思義妄立名目以惑病家而病家反以醫人能呼其名為有識遂相沿成習牢不可破推其緣故良由不能按穴立名設此夜半之詞以聳聽耳宜改牛程蹇為行程蹇其餘均以穴道名之如不入部位者曰無名腫毒而已若夫便毒不盡生於怨曠古書指為欲念不遂殆不其然即黴瘡亦不僅淫毒為患必先有濕熱內伏乘淫邪而發作若其人本無濕熱雖日遊邪徑亦不傳染也苟濕熱內甚者雖不狎邪感著其氣即染也破傷成證亦然皆不可執一而論又云外科蠟礬丸本草載之極言其解毒護心護膜之功夫蠟極難化礬又傷心而澀腸病者進以甘旨尚難運動反投以堅澀難化之物必胃閉而不能食證將因之而劇即膜須蠟護而吞入腸胃之間蠟亦未必至膜方書之言可盡信哉又云古書所載有不盡然者厚味生癰疽膏粱之變足生大疔此忌口二字之所本也余謂此為富貴之說法非所以論大概也千金外臺無不以慎口腹為要務東垣云癰疽食肉乃自棄也究之諸公當日所交遊者皆富貴也王氏自謂我術但治貧病然以刺史之尊於民間日用疾苦相離尚遠其所稱貧病非藜藿無告之貧也若勞苦貧人所患瘍毒皆由六淫外乘而醫者不知變通甚至蔬腐不許入口一餐之間有許多禁忌幾有絕食之苦病人何以堪此因之胃閉而病不能愈此由見理不明操技不精藉忌口二字為口實以文過而飾非及至用藥則蜈蚣桑蟲甲片蜂房蛇蛻角刺諸毒藥浪用無忌何獨於尋常食品而嚴申禁戒乎習而不察曷勝浩嘆若能於富貴人退之貧苦者進之庶乎兩得其平蓋胃氣充足病必易愈肌亦易生設此義不知亦焉能識病情而施妙治乎又云考古治疾無分內外刀針砭刺蒸灸熨洗諸法並用不專主於湯液一端今諸法失傳而專責之湯液故有邪氣隱伏於經絡之間而發為癰疽也夫用藥如用兵若為將者奉命伐暴廢其紀律不以摧堅破賊為己任徒從事於文檄簿書之間虛應故事以待賊之自斃養奸玩寇滋蔓難圖至使與國俱亡而後已失其為將之道矣乃醫者治癰疽棄其刀針不以決去膿腐為亟務徒從事於方劑湯液之間以待疽之自潰因循姑息養癰貽患至使與身俱亡而後已失其為醫之道矣洄溪論外科曰手法必求傳授此言是已但穎悟者自能心得否則雖授無益也今針砭諸法不行久矣醫者棄難而就易病者畏痛而苟安亦由今時之風氣尚虛聲喜浮譽循名而不責實世道所以愈趨而愈下者時也勢也秦緩曰藥之不達針之不及仲景治傷寒用麻桂以發汗其汗之不徹者針刺出血以代汗今人謂麻桂不可用而代之又禁刺法謗為泄氣以致留邪不去發為遺毒如史傳所載雖帝王將相之病而用刀針者不勝縷指試問今日遇之尚敢出諸口乎故曰時也勢也可見在昔內證尚須外治今則瘍科專以湯液治外疾藉言補托遷移時日輕淺者糜帑勞師深久者潰敗決裂或死無斂具或殘體破家醫者自謂謹慎而不知殺人無跡病者樂於苟安而至死不悟此即子產所論水愞弱民狎而玩之則多死也不意於醫道亦然可不哀哉彼醫者豈設心欲殺人耶實由不能辨其為膿為血也亦有能辨之而故緩之以斂財亦有不能用刀針僅藉湯液數方貌為愛護之言以愚病家反訾刀針為險事而自護其短指蒸膿發墊為內病指重證為死證果死則可以顯我之有斷幸而不死又可邀功而索謝吾誰欺欺天乎古人有戒用刀針之說者蓋謂膿未成而戒其早用非一概戒之也然則決不可服藥乎曰始則不外汗之則瘡已若瘡家不可發汗指既成而言也亦非一概戒之也善後不外理脾胃數法之外不必他求矣愚謂外證初起由於濕熱內蘊或痰飲留滯以致氣壅血凝者多此宜疏通清化為先汗之則瘡已特為外感不淨而發者言也又云正宗十日點破之說不可泥定總須辨其膿之成否為斷辨膿甚難或一二日已有膿而皮色不變或十餘日無膿而皮色紫黑辨之一字談何容易刀針不敢輕用由其審斷不明也始之以謹慎愛之者終之以因循誤之也嘗有破家廢業殘損肢體服藥至累百盈千挨延至數月之久仍須刀決者亦有不待決而徑死者其故在辨之不早辨之不精也如胸疽膿脹為患不決必死臟毒不早決必成漏管頭面唇口疔毒不決不拔必死喉癰既成不決必死疽發交骱不決必成殘廢青腿牙疳不砭必不救行程蹇湧泉疽不決成廢而死紫雲風不砭必死又云正宗脫疽一證在指則切之說全無道理洄溪論蟲之說亦屬笑談蟲動物也豈能隔皮殺之若使遁往他處猶之流寇滋蔓必致遍地荊棘矣石榴疽即翻花瘡同類大率由於伏熱外越血不歸經所致似與目中胬肉同義昔人治一人目垂胬肉刺委中及患處立痊余師其法以治此證甚效寒族中有患此者內服外蝕而亡治此者宜鑑之瘭疽甚多手指生滿逐枚破去其膿立愈誰謂江浙所無吾鄉呼為惹肥多骨疽有二其一因膿老而干漸堅如骨而不能出久則成漏瘡出之即愈亦有患處高起膿與細骨並出不已者又一種患處堅硬十年五載不痛不潰者古書謂受孕月內六親骨肉交合而成此等不經之談汙衊後世誠可痛恨而無識之醫輕信之妄肆譏誚覆盆之冤誰為雪之余謂胎無二受其為駢為品者皆一受而成者也此證實由流痰滯血阻於腠理日久堅硬其堅如骨痛則骨欲出也亦有幾齣復生數出而後已者尚得再謂胎里疾乎智者不惑斯可以為醫矣余治四人皆愈又云紅腫屬血心主血若執諸瘡痛癢皆屬心火之說而用瀉心湯內疏黃連湯誅伐無過往往有內陷者矣去其膿腐為外科要務富貴者畏痛不欲去貧者穢惡異常醫家託言不可去因而蔓延不救者多矣吳俗好鬼自吾鄉以及嘉湖蘇松常鎮等處凡家有病人必先卜而後醫而卜者別有傳授信口胡言輒云有鬼令病家召巫祈禱必用雞數只豕首數枚禱而未愈則頻卜頻禱故有病未去而家產已傾者有人已死而殮葬無資者不量貧富舉國若狂其禱畢之際所備牲物必使親朋啖盡若在富宦之家則使僕婢啖之故大嚼之徒每有因此致病者病必亦卜亦禱遂至蔓延不已習俗相沿即號為紳士者亦復為之陋俗殆不易革惟望長民者嚴示卜人凡占課但從卜筮正宗不得擅用邪書妄言鬼祟即欲徇俗祈禱准以素食為供庶可全民命而惜物力洵賢有司之惠政也拭目俟之避暑錄話云士大夫於天下事苟聰明自信無不可為惟醫不可強如聖散子方初不見於世間方書巢谷自言得之於異人子瞻以谷奇俠而取其方序以傳世天下以子瞻文章而信其言事本不相因而趨名者又至於忘性命而試其藥人之惑蓋至是也又云蔡子因之妻服陷冰丹而齒皆焦落愚按友人徐君亞枝之外姑許丈亮耕室也誤服附子藥一劑而齒盡落禾中虞君梅亭患莖痿醫者不知其為濕熱而誤認陽衰與以雄蠶蛾而一齒陡折周公謹云和劑局方乃當時精集諸家名方凡經幾名醫之手至提領以從官內臣參校可謂精矣然差舛之處不少且以牛黃清心丸一方言之凡用藥二十九味其間藥味寒熱訛雜殊不可曉嘗見一名醫云此方止是前八味至蒲黃而止自乾山藥以後凡二十一味乃補虛門中山芋丸當時不知何故誤寫在此方之後因循不曾改正凡此之類貽誤匪細楊素園大令云余與半癡論膈證謂噎必有物為梗當有專治之藥能消其梗者斷非書中所云生地當歸等滋潤之品所能治也且余於此證歷考群言均無定論用藥亦皆庸劣惟戴人確有所見但用藥太峻人不能從耳至其病所由來則必屬於肝膽試觀患此證者多憂思抑鬱之人或嗜酒之徒是其故可思也半癡頗不以為謬命著一論附諸古今醫案按選之後第愧學識淺陋不能思一物以治之也近竟得一方以初生小鼠新瓦上焙乾研末醇酒沖服萬舉萬全真是奇方因錄寄半癡俾傳於世愚曩輯古今醫案按選成而大令於乙卯初夏過杭為余評點別去經年忽于軍務倥傯之際不遠千里以此方附包封遽來其仁民之心可謂切矣余近採簡妙單方一帖名篷窗錄驗方又續採二卷多醫家宜備之藥可以應世可以濟貧吾鄉蔣生沐廣文見而善之已梓入彙刊經驗方矣徐洄溪云嘗見一人頭風痛甚兩目皆盲遍求良醫不效有友人教以用十字路口及人家屋腳旁野莧菜煎湯注壺內塞住壺嘴以雙目就壺熏之日漸見光竟得復明愚謂此方藥易而功奇未入錄驗方故附於此考本草莧通九竅其實主青盲明目而莧字從見益嘆古聖取義之精吾鄉許君辛木重訂外科正宗附自制消核膏一方治瘰癧乳核流注及各種結核施送多年甚著奇效惟已潰者勿用其方用制甘遂紅芽大戟各二兩白芥子八錢麻黃四錢生南星薑製半夏殭蠶藤黃朴硝各一兩六錢凡九味以麻油一斤先入甘遂南星半夏熬枯撈出次下大戟三下麻黃殭蠶四下白芥子五下藤黃逐次熬枯先後撈出六下朴硝熬至不爆用絹將油瀝淨再下鍋熬滾徐投入炒透東丹攪勻丹之多少以膏之老嫩為度夏宜稍老冬宜稍嫩膏成乘熱傾冷水盆內扯撥數十次以去火毒即可攤貼宜厚勿薄且云膏之老嫩各有所宜凡潰瘍諸證膏勿太嫩總以貼之即黏揭之易落為度攤勿過厚嫩而過厚則揭時非帶脫皮肉即黏住皮肉凡尋常熱癤本可無疤而或生妒肉或如蟢鏡者非黏傷其肉即膏藥之過也獨消核膏宜稍嫩但令貼時勿烊塌而已攤時須極厚蓋此膏本以代敷藥嫩而厚則藥氣沉浸濃郁而能深入又皮肉如常帶脫無慮黏住可洗也即煎膏亦有法度藥物堅脆不同若一同投入則脆者先枯其勢欲燃不得不一同撈出然堅者實未熬透雖銖兩較重而味終未出也如消核膏甘遂南星半夏最堅故先下大戟次之麻黃殭蠶更脆故又次之白芥爆油又次之藤黃多液少渣又次之朴硝無質故最後下凡煎他膏亦當如此愚謂凡結核多挾痰故許君以控涎丹為君而加行氣散結為佐宜乎施之輒效也至所論膏之老嫩厚薄及藥物之堅脆分落鍋之先後尤為用法者之所當知惜未有人道及故亟錄之蕭山郁龍士瑤史云到瘴癘之鄉一不可吃冷物凡蠱毒皆下於冷物也二不可近女色三不可過飽飢則可治飽則不可治也若瘴氣來鼻聞異香宜即臥地口含土即不受矣又廣中溪水不可飲因山多鐵梨其葉落於山水中漬之極毒又多孔雀其糞甚毒惟開土掘泉為妙左江至英德一路皆然鐵梨器用放熱物受毒誤食即生癰疽愚謂食毋求飽乃養生卻疾第一方應休璉詩云量腹節所受是也強飯二字最為無理世人因此致命者甚多豈獨瘴鄉所忌哉認字測八十一篇關中周子夫宇著以八十一字為題閱其認壽字云理壽莫如口其說備於易之頤頤者養也頤貞得養得養斯壽乃其歸在慎言語節飲食言語能慎而出飲食能節而入頤貞莫如斯理壽莫如斯矣蘆菔可代糧救荒膳夫經云貧窶之家與鹽飯偕行號為三白瑤史又載治夢遺方臨睡時以朴硝些須放手心內用唾調和將龜頭一擦甚驗蔬中之蔥功用甚廣跌打金瘡皆為聖藥其性與蜜相反而外治藉其相濟更多神妙凡癰疽初起及熱結腫痛痞積諸病塗之輒效從此引伸觸類可得用藥之巧蘆菔之功先曾祖隨筆中已發明之矣冬時採其葉懸掛樹上或攤屋瓦上至立春前一日收入甕中藏固如不幹燥收掛屋內候極燥入甕凡一切喉證洗淨濃煎覆杯立已並治時行客感斑疹瘧痢及飲食停滯脹瀉疳疸痞滿諸證無不神效價廉功敏極宜備之又瀛寰志略云佛郎西蘆菔造糖味同蔗惜未傳其法也海䖳妙藥也宣氣化瘀消痰行食而不傷正氣以經鹽礬所制入煎劑雖須漂淨而軟堅開結之勳則固在也故哮喘胸痞腹痛癥瘕脹滿便秘滯下疳疸等病皆可量用雖宜下之證而體質柔脆不能率投硝黃者余輒重用而隨機佐以枳樸之類無不默收敏效晉三先生但言協地慄以清肝熱豈足以盡其能哉余偶患睛赤腫疼而素畏服藥亟以朴硝一味泡茶乘熱熏洗日數作不日痊夫硝善滌垢濁乘熱則風火濕熱諸邪皆可清散凡水鄉農人多患腳氣俗名大腳風又名沙木腿一腫不消與尋常腳氣發過腫消者迥殊治之輒無效此因傷絡瘀凝氣亦阻痹風濕熱雜合之邪襲入而不能出也故病起必胯間結核而痛憎寒發熱而漸以下行至足初起宜亟用蔥白杵爛和蜜罨胯核痛處濃煎海䖳地慄二物俟海䖳化盡取湯吞當歸龍薈丸三錢俾即消散為妙若已成者以川黃柏一斤酒炒研末海䖳一斤勿漂煎烊加蔥須自然汁和勻泛丸如綠豆大茅根湯日送三錢外用杉木刨花煎濃湯入朴硝一兩頻洗日以藍布浸鹽滷束之以鹽滷善清濕熱散風毒凡洗鵝掌風腳氣並良也忌一切辛熱發物尤忌蠶蛹如此治愈數人矣次女定宜十四歲患左腿足赤痛微腫初不以為病也既而時作余令以黃柏研末水泛丸淡鹽湯下日一錢服匝月而刈其根舍弟季傑之妾患帶下如注余知其肝熱素熾也亦令服此丸日三錢月餘果愈以此類推不但藥貴精而不貴多並不貴貴也故詳錄之營虛氣奪脈微欲絕者仲聖主炙甘草湯以復其脈故此方又名復脈湯夫人而知之者若客邪深受氣機痹塞脈道不能流通而按之不見者名曰伏脈此為實證與絕脈判若天淵苟遇伏脈而不亟從宣通開泄之治則脈亦伏而漸絕矣但此為邪閉之絕彼為元竭之絕不可同日而語也聞一人素患腳氣今秋發之甚劇兼有寒熱氣逆面浮等證醫切其脈沉伏難尋以為年逾五十宿恙時發脈已欲絕遂進炙甘草湯冀復其脈越日視之果脈絕將死矣或稱其脈法精而善用古方以告於余因詢其二便通乎曰否嘻此邪閉而脈伏也大實之候誤作虛治滋膩妄投徑爾塞殺死於病乎死於藥乎可哀也已今年夏仲仁和胡次瑤學博過訪云其從女適朱仲和茂才六令弟者患肝胃痛朱以省垣罕名手為求乩方與服大率多香燥伐肝之品數服徑死何耶余曰肝胃痛亦有虛實寒熱之分令侄愛想是陰虛血少之病因檢甲寅治徐君亞枝令媳案示之胡始悟為藥誤又云沈少蓮孝廉七令弟患兩腿痠軟頻餌雞血藤膏忽一日精流不止而亡此曷故也余謂雞血藤性熱善走專祛風濕而行瘀滯沉乃瘦弱陰虧之質此腿恙必肝腎之虛治宜滋潛濡養而誤服燥熱之品故有此變是陰精悉為迫逐也又云餘杭唐聽江進士患疝醫投溫補法附子服至一兩二錢馴致二便不行飲食礙進復重用麝香等藥以開關格而便不能通乃至糞從口吐狂叫而死抑又何歟余曰昔唐設帳於會垣陳君雪舫家余嘗切其脈亦屬陰虛之體此疝必非實病亦非寒證但宜溫養少陰清舒厥陰為治而率投剛烈香散已屬非宜況服之過多則陰液盡劫風火上騰腸胃受燎原之焚而失傳導之職顛倒反覆故糞從口出狂叫以死也胡云君盍筆此於書以為世人惑鬼神餌成藥喜溫補之戒乎余遂錄之山妻將娩已見紅矣胎忽上衝作嘔夤夜事急余以醬油和開水一錢與服咸能潤下果入口即安
