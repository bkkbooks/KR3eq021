body:
  text: 卷三漢軍王爵字大封博通今古不求進取而工醫能起死回生危疾遇之罔不活某軍有大貴人舉家數百口皆疫疫且將死延之治王逐一視脈投劑皆立起惟貴人不與療強之再乃開方大書云砒霜三錢火酒四兩煎服貴人愕然謂之曰若是者不速死耶王正色曰若貴人者不速死何俟貴人曰我何罪而至是耶王曰貴人身為大臣不思致君澤民乃以貨利為心橫求苛索八旗軍士痛恨入骨一旦聖明知之賜死西市身首異處家財籍沒妻孥入官不若速飲余之砒酒庶幾完其頭領保全家口此真良藥也寧以為毒而卻之乎於是貴人悚然受教卒改其行郡中朱姓素有飲癖在左脅下發則脹痛嘔吐始發甚輕醫者每以補劑療之發益勤而甚余戒之曰此飲癖也患者甚多惟以消飲通氣為主斷不可用溫補補則成堅癖不可治矣不信也後因有鬱結之事其病大發痛極嘔逆神疲力倦醫者乃大進參附熱氣上衝痰飲閉塞其痛加劇肢冷脈微醫者益加參附助其閉塞飲藥一口如刀箭攢心哀求免服妻子環跪泣求曰名醫四人合議立方豈有謬誤人參如此貴重豈有不效朱曰我豈不欲生此藥實不能受使我少緩痛苦死亦甘心耳必欲使我痛極而死亦命也勉飲其半火沸痰壅呼號宛轉而絶大凡富貴人之死大半皆然但不若是之甚耳要知中病之藥不必入口而知聞其氣即喜樂而欲飲若不中病之藥聞其氣則厭惡之故服藥而勉強若難者皆與病相違者也內經云臨病人問所便此真治病之妙訣也若孟子云藥不瞑眩厥疾不瘳此乃指攻邪破積而言非一例也鄰人顧姓者因少年勤內事頭皮血出如汗此肝腎之火逆上因血熱甚所以從發竅直出蓋汗乃血之液從氣化白經有肌衄一條因氣散不能從化故肌膚汗血此證非氣不能化化亦不及也與甘露飲而痊章御臣屢夢白人持刀自割其頭至流血即驚醒漸至閉目即夢衆醫莫措松江沈魯珍治之曰寐而見白人者肺虛也以獨參湯每劑一兩服之而愈當湖汪希生內政中年時每食豬肉即體戰栗屢醫不效嗣因他病服逍遙散數劑而舊疾亦瘳後與余談及此事並詢其故余謂素問云諸禁鼓栗皆屬於火此必肝膽素有鬱熱豬肉乃動風之物能引動其病而不能開其鬱故食之即發逍遙散乃開鬱散火之劑所以偶服得愈愚按錢塘吳君馥齊令正每食豬肉少許即腹痛氣衝神瞀如寐必嘔吐而始舒如是者經年余亦作厥陰鬱熱治以雪羹吞當歸龍薈丸而瘥余郡一人項邊忽癢漸起白痕一條相延漸欲至喉癢不可忍群醫莫識一方士以刀輕開其痕出白蝨甚多而愈曰此蝨瘤之類凡皮內作癢或起痕或高起皆其證也杭州周南溪年三十餘體壯畏熱飲冷貪涼至仲秋忽兩腿筋脈掣痛數日後牽掣至兩臂又數日手指一動即周身筋脈掣痛而絶諸治不效餘脈之弦而急弦為飲急為寒乃寒濕生痰流入筋隧也以半夏茯苓各三錢白芥子二錢橘皮木瓜各一錢五分乾薑一錢生薑三片煎送控涎丹一錢服後手指可動再服手足不復牽掣改與六君子湯善後而愈湖州湯榮光解元世業傷科接骨有奇效其家傭者採桑於樹樹折墜地腹著枯樁而破人即昏暈湯聞之令徒攜藥敷治徒視瘡口二寸余已透膜內系紅肉不見腸故以線縫之而形似口張不能合徒以告湯自往視之果然乃令舁歸傭少醒復飲以藥酒使不知痛楚隨用刀割傷口使寬以鐵鉤鉤膜內紅肉出則其大如掌乃宿患之瘧母也始如法敷治瘡口而愈宿疾頓除一富翁傾跌傷臂骱脫護痛不許人動搖人皆技窘湯令患者向隅立卒取冷水潑其頂患者陡作寒噤即乘勢將臂一把骨隨入骱愈矣一人因跌而脊骨脫骱者下節錯向內無可著手湯令其家密備栲栳一隻中安綿絮置於旁扶患者環柱走走乏卒推置栲栳間上身直而下身彎環所脫脊骨稍凸出遂以按入而愈愚謂此等手法心思非凡庸所及苟能觸類而通則自無難題矣呂氏婦病兩旬延余視之甫入室病人裸衣而臥神色不清猶自掖被掩其胸及按脈細而無神目瞀內煩咽痛不能容湯水身冷如冰汗出如洗余思仲景云大寒反汗出身必冷如冰咽痛目瞀者龍雷之火上炎也用熟地一兩桂附各一錢菊花三錢煎成冷水浸涼服之諸病如失即索粥飲次日再一服隨以大補之藥十餘帖而安愚按大寒反汗出乃陰盛格陽於外也故身冷如冰咽痛目瞀者陽戴於上也凡格陽戴陽皆是虛陽外越所謂內真寒而外假熱故可以以桂附引之內潛不可誤謂龍雷之火上炎也夫春分龍見而雷乃發聲秋分龍蜇而雷乃收聲是龍雷之火必炎於陽盛之時人身一小天地肝為角木震為雷龍雷之火即肝火也必腎陰虛者肝陽始熾致生龍雷上炎諸證治宜壯水制火設昧此義而妄援引火歸元之說不啻抱火救薪矣古書辨別不清貽誤非淺惟葉天士先生景嶽發揮何西池先生醫碥發明最暢學者所當究心也舍弟仲韶於乙卯新秋陡患洞瀉數行即渾身汗出如洗懨懨一息夤夜速余往視脈亦沉細身涼不熱宛似虛寒之證惟苔色黃膩小溲全無乃濕熱病也與桂苓甘露飲一劑而瘳附録於此以便互勘友人洪嶽山用仙人杖炭與煅牛齒等分研末桕子內青油調以箍膿甚效後余治一肝鬱為病中脘脹滯作痛腹漸大欲成脹病治以宣利疏養之法二十餘劑腹中已覺寬暢惟大腹仍空阜不癟思索再四於原方加入仙人杖數寸一劑果平蓋嫩竹出土自枯取其自然之性遂合病機而收捷效愚謂方藥主治皆可借用有人因勞力後季肋作痛諸藥不愈而問治於余適徐君亞枝有保胎神佑丸寄送余遂以三錢與之竟爾霍然繼有因踢傷而腹痛時作者來乞藥亦用此丸一服果下黑矢而平道光丁亥秋季病寒熱者中脘俱結塊如覆碗投以瀉心陷胸皆不效死者不少因閲外臺祕要載有增損理中丸方主治纖毫不爽余用以治此證無不立應間有一時不能消仍作丸服以刈根株凡余所治其最劇者陝人王姓群醫雜治兩旬邪塊較大按之拒痛四肢逆冷形萎面青齒槁舌鏡無津大便旬余不解脈弱欲伏余謂邪氣搏結中宮正氣津氣幾已消涸即師其法用東洋參白朮各二錢黃連乾薑各五分牡蠣五錢花粉三錢枳實一錢五分元明粉三錢服後便行塊即漸減脈亦稍起四肢略溫仍以是方加減十餘劑而痊陳氏婦盛夏病霍亂吐瀉腹中㽲痛四肢厥冷冷汗溱溱轉筋戴眼煩燥大渴喜冷飲飲已即吐六脈皆伏余曰雖霍亂實臟厥也經云大氣入臟腹痛下注可以致死不可致生速宜救陽為急遲則腎陽絶矣以四逆湯薑附各三錢炙甘草吳萸各一錢木瓜四錢煎成冷服日夜連服三劑四肢始得全和危象皆退口渴反喜沸湯寒象始露即於方中佐以生津存液之品兩服而安愚謂此案論證用藥皆有卓識惟不言苔色尚缺周詳其真諦在喜冷飲而飲已即吐若能受冷飲者即為內真熱而外假寒矣倪姓患霍亂吐瀉審知始不作渴四肢不逆脈不沉細一醫用大順散兩帖漸至於此因見四逆復加附子脈證更劇余曰此病一誤再誤命將殆矣若果屬寒投熱病已今反四逆脈轉沉細欲伏乃釀成熱深厥深與熱邪傳人厥陰者何異即以竹葉石膏湯人參易西洋參加黃連滑石兩劑而愈同時有陸姓患此醫用回陽之劑日夜兼進厥逆煩躁日增病人欲得冷水禁絶不與甚至病者自起拾地上痰涎以解渴遷延旬日而死噫即使真屬陰寒陽回躁渴如是熱藥之性鬱而無主以涼藥和之病亦立起不學無術曷勝浩嘆張氏女夏月患霍亂醫用薑附藿朴茱連等藥吐嘔雖止腹痛不已而痢五色至第八日始延余診兩目罩翳唇紅舌絳胸隔煩悗口渴引飲脈細數沉部有力是暑穢之毒擾亂中宮而病霍亂苦熱雖欲開鬱止嘔畢竟反助邪勢致變五色毒痢與子和桂苓甘露飲加黃連銀花黑豆兩服翳退而諸恙遞減胃亦稍蘇因畏藥不肯再服余謂餘邪未淨留而不去戕害臟腑必轉他病乃與三豆湯加甘草代茶頻飲而愈槜李陸集園治寒濕暴侵咳嗽不止用豬肺管一條入去節麻黃二三分兩頭以線扎緊配以杏苑橘枳蘇子等品煎服甚有巧思王燮庵乃郎痙病角弓反張兒醫不能治王自用當歸四逆湯一服汗解亦可謂善讀仲景聖書矣然此必太陽風寒之邪因血分不足而內犯厥陰故宜此方非凡痙皆宜此方也一成衣患三瘧數年繼又痢下後患周身浮腫待死而已忽得一方用新鮮楝樹上菌一枚切碎煮熟連湯淡服一啜而三恙悉痊王燮庵幼時痧後食酸太多咳嗆不止年餘骨立五心煩熱已近童勞一人教於每日黎明以頭窠雞子一枚打千餘下入鹽少許沸湯瀹服百日而痊黃氏婦崩血不止大便泄瀉半身痹痛餘脈之右濡左浮弦略數知其脾有積濕肝有鬱熱因外風內陷入腸胃則泄入血室則崩竄絡則痛也與旋覆花湯加歸鬚桃仁柏子仁潤血和絡川芎神麯以化濕芩防堅營散風五服而三恙全愈常州伍某素壯健方啖飯忽呼痛倒地云胸膈如刀割群醫莫解閲三日懨懨待斃矣一老人過問病人令磨陳墨汁與啜痛立止病如失因問此何證曰記少時鄰人患病類此一老醫以此法治之而愈謂誤食天絲毒也想墨汁無害故令試之不料其果合耳固始有人於元旦食湯圓訖方出門賀歲忽腹如火燒痛不可忍暈絶仆地移時稍蘇而號痛聲徹四鄰延醫診視皆云脈細如絲不治越日門外來一丐僧家人辭以有病僧云何不問我家人苦無策姑令診視僧一望即曰是誤食蛇精也於破囊中取藥丸一粒以水研灌移時病者起嘔如雀卵者數枚僧云未也復嘔穢狼藉出一物如雞子大僧曰是矣剖視乃血裹中蟠一小蛇見人遽動作勢上下病已若失舉家驚服叩其所以云多年陳谷蛇交其上餘瀝黏著誤入腹中乃成此物少停即洞胸腹出矣僧徑裹蛇而去愚謂二證皆不易識大凡腹中卒然大痛在飲食後而無別證可憑者無非中毒也重用玉樞丹研灌似亦有效海州劉氏子五歲出痘遍體疙瘩大如甌凡三四十枚醫皆不識一老嫗見之曰此包痘也吾所見並此而二決無他虞六七日疙瘩悉破內如榴子層層灌漿皆滿真從來未睹者痘書充棟亦未道及可見醫理淵微即此一門已難測識矣一婦免身後脬腸內損積穢礙塞清濁混淆而大小溲易位而出以生黃絲絹黃蠟白芨明礬琥珀銼末水丸豬脬一具煎湯下即愈一人無故舌出於口寸余或以巴豆煙燻之飲以清心脾之藥不效余取雞冠血塗之使人持銅鉦立其後卒擲於地聲大而騰病者愕顧視其舌已收矣或請其故曰無他舌為心苗心主血用從其類必雞冠者清高之分精華所聚擲鉦於地者驚氣先入心治其原也富人馮氏者寒熱如瘧溲溺閉塞少腹隱痛汗出淋漓醫以為瘵頻飲補劑日益憔悴餘切其脈細重按之沉緊而實曰此有積瘀而成小腸癰於法當下咸謂病久尪羸下恐有害且素逸處安有積瘀余曰論脈如是可詢病者曾持重物否其人以告病者初不省既而曰一月前會攜鏹方出遭客至匆遽復入越日而寒熱作得毋是耶藥已遍嘗而病不去盍從其治遂用桃仁承氣湯搗土牛膝根汁和服次日腹下痛如刀割殷血從溲溺出如是數次痛良已病尋愈余視疾以之至先後為序一日於衆中瞥見一人額端已起白色急呼前問所患曰臂有微腫視之僅一小疱因潛謂同來者曰此白刃疔色已見額速歸矣危在頃刻其人方出門面部色漸趨口角未至家死有僕足跟腫終日奇癢余曰此蝨瘤也破之出黑白蝨數百癢止腫亦退一人患時疫發狂譫語若有物憑之曰不饗我當取汝手骨已而十指軟墮如餳余曰是謂筋解實痿證也古人治痿獨取陽明脾主四肢表裡相應投以桂枝白虎湯神識頓清手指無恙潘氏子肋下腫潰竄孔甚巨孔中作聲如嬰兒啜泣余曰是名淵疽法不得治其母哀請曰是子少孤婚又未久一脈之傳惟此而已余聞之惻然乃曰但善調攝更量力以行陰德萬分一得不死專事醫藥不足恃也母子唯唯受教余乃日夜屬思以謂證屬大虛固當補益但疽孔作聲則內膜已破氣從旁出矣非護其膜補亦徒施以人參白朮烏梅炭白芨白蠟象牙屑豬脊髓和為丸令日三服以固氣仍搗諸藥益以生肌之品制若黏餅塞疽口絲綿裹青鉛罨其外大膏藥蓋之闊布纏縛其體三日一易復用參麥六味加龍蠣等品煎汁飲之如是二十餘日其聲漸除三月餘而口斂余初經治不望其果奏效也鎮洋鄭秀才頸下出水涓涓不絶已數年矣醫謂串癧余視之潰口三四皆甚深奧曰此古所謂蟻瘻也用穿山甲炙存性研敷果瘳有食阿芙蓉者遍體發疱痛癢交作抑搔膚脫終日昏聵言語誕妄余曰此中毒之最盛者尋常解法恐不及濟用硃砂一兩與琥珀同研末犀角磨汁和三豆湯進之神志頓清而遍身無皮痛不可忍復磨石菖蒲緑豆粉如塵黏席乃得安臥不半月愈一婦患三瘧年餘忽轉身發瘡大皆如錢瘍醫治久轉劇飲食不進余曰此伏邪走泄為瘡三陰無恙矣不可作瘡治而以寒涼傷胃也以四君子加耆歸白芷數服即愈昔在海門有同事樊姓者肩上患癰醫進荊防敗毒散而寒熱大作又進仙方活命飲外敷三黃散四五日俠脊焮腫作痛紅暈滿背脊間高如覆碗又飲內疏黃連湯外塗鐵箍等散更日服蠟礬丸至十朝黑陷聲嘶嘔惡湯水亦不能沾十一朝昏暈不蘇前醫皆云毒盛無可挽回招之不至矣有故遊擊楊公朝棟之孫忘其名善治癰疽因不識字人皆輕之樊證瀕危不得已邀彼來視笑曰此非陰證被寒涼遏抑所致用吾藥而患處能高起者尚可救乃出藥敷瘡上越日果高起楊復視曰能從吾言此疾可生第一不許服藥第二不許忌口緣現在粒米不進必停藥三日使胃中宿藥漸消自能進食既能食正宜投其所喜豈可強禁其口而再絶其胃氣哉如此則百二十日可以收功後竟如其言而愈至所用之藥留心揣測終莫能識然此證若於初起時內以點舌丹汗之頂上以蟾酥丸或白降丹泄其毒使有出路必無橫潰決裂之禍寒涼日進而胃閉不納蠟礬頻服而聲嘶作嘔釀成敗證設無楊公人亦但知其死於病惡知其死於藥乎舉世夢夢良可深悼壬寅余在海門之東昌鎮有徐姓者患胸鑠腐肉上至頂下至頸左右至兩耳醫不能治余憫其貧為設法痊之並不服藥凡百四十餘日而收攻此開手第一證也由是求治者踵門不絶余初亦未知不服藥可愈病因目擊楊公之法而私淑其意治之果應始悟世之外科朝涼暮熱欺世盜名殺人不可勝計而無形跡可尋也其始臨證則曰死證也或他人治過之證則曰前醫誤治不可救矣皆為日後邀功避謗之計耳可嘆也已余在海門見沈氏司炊者患唇疔自辰至午口不能開醫投蔥礬不能吞用活命飲亦無濟易醫屢進寒涼遂硬腫至項色白不變最後一醫砭腫處出血筋一條流血不止知飢不能食至三十一日而死夫唇疔急證也色白無紅陰證也發於手足陽明交會之所誤投寒涼克伐之藥內熱為外寒所束可知若初起時刺委中及陽明諸穴出黑血進點舌丹汗之外塗蟾酥或有可效惜諸醫皆不知之不然急證安能延至一月餘之久人不知死於藥也哀哉癸丑四月桐鄉屠甸鎮張德祥令正年八十一歲患腦鑠醫者皆云必死余視之瘡已潰爛不堪不臥者二十三日不飲食者五日平素體肥肌已削盡兩耳絶不聞聲脈象弦數性不喜藥一病至此亦未嘗一藥也諸醫皆謂不服藥以至於是余謂潰敗至此尚可挽回者幸未服藥耳但須從我言行我法則五六十日可以收功蓋瘡口已深須開一孔泄其膿血若不從我言則下延及喉雖有神丹不可救矣病家唯唯遂開一孔去黑血盞許膿亦相等明日頭重如失兩耳能聽且進粥碗許越五日復視腐肉下半脫盡新肉已生細視上半黑處尚未全死用物挑起其皮入藥於內令其每日抽換果得黏連凡九十日全愈其滿頭之發皆白而爛處復生之肉新發皆黑此人至今尚健益信享高年者不服丸散嗣有於某等十餘人余悉治愈是此證並無死法曩上海望族王輯庭之嗣君年六十一歲患此證素識醫者謂曰少忍痛當為去之不聽逾旬漸大適道署延蘇州陳某治疾乃赫赫一時者遂請視之進以人參鹿茸等藥瘡已勢甚猶曰未也乃殺雞煎湯煮藥以進一服而口眼皆合頭重如山證隨以敗凡富貴之家死於此者甚多始則畏少痛而逆忠言繼則慕虛名而被慘殺非死於病實死於醫願天下人少察狂瞽之言毋蹈前車之覆發背之極大者所謂竟體發也平湖郭湘屏患此證始醫者進犀角黃連致成黑陷後醫者投桂附而作淋渴飲食不進或斷三日或斷一旬更醫數輩技窮莫措令郎肖屏茂才求余往視被問曰曾見此大證乎余實未嘗見如許大證欲安其心慰之曰吾所見有大於此者不足畏也為取去腐肉碗許病者即覺如釋重負其子請用十全大補余曉之曰尊翁之所以絶粒者正坐補托之故胸次宿藥未消今再峻補生機絶也俟三日後宿藥消盡胃氣自蘇此證本由濕熱鬱蒸而成寒涼以遏之溫補以錮之宜其滋蔓日甚也今惟導赤散驅其濕熱下行至溺清則止越五日復視已能自起在床沿叩謝救命凡百八十餘日而全愈在百日之間曾患牙疳與竹葉石膏湯而安其人至今尚在設依立齊上渴下淋而用十全八味安有生理陳良甫云既潰一毫冷藥不可進其可泥乎斜橋蘇氏婦年二十四歲患乳腫如懸瓠潰處日流水醫治二百餘日略不見效冬初求治於余視其面色青瘦微嗽唇紅音朗不嘶寒熱暮甚日進粥兩盞飯半盞所服之藥洋參鱉甲丹皮之類皆謂瘡勞已成不過苟延時日也余知其因循誤藥致此以紙捻入藥於瘡孔囑到家自為抽換婦云胃氣不佳求賜一方余曰汝誤藥至此尚不悟耶停藥五日胃自蘇矣又問究成勞否余給之曰後五日來當贈汝妙藥決不成勞也欣然而去越五日來日奇哉到家方暮覺乳脹抽去藥線出清膿碗許是夜寒熱頓減近來抽換日得清膿杯許今不復如前腫硬矣飯已可進兩盞固求賜方余曰煎劑費事余有合就丸藥日服數錢可也持去後越旬復來曰自服妙藥胃氣勝於平時惟膿水未淨月事未行求一通經方余見其肌肉豐潤兩頰紅暈經已將至若不與藥而另求內科通經反恐誤事仍以前丸與之後即全愈受孕其實兩次所用之藥皆飯焦磨末少如橘皮而丸也余治六七年不愈之乳證無不用藥線刀針愈者不勝僕數即如此婦若不插藥膿何由出寒熱何由止胃氣何由復豈但瘡勞而已殆無生理矣設不停藥腸胃津液被伐必致絶粒嘗謂漢唐方士以金石殺人賴高賢救止而草木延年補益諸說牢不可破真醫道設而枉死者多矣竊怪今之醫生勸人服藥吾不知其居心何為或問斷為死證而得不死何也曰醫之所謂死證彼自有死之之法耳斷為死證而竟死昧者必詫其術之神而醫者亦詡其斷之准而自鳴得意悲夫業醫者知此有幾人哉張德祥令孫患行程蹇多醫不效上至小腿腫如瓠氣喘聲嘶不食者九日煩躁惡近人近則熱不可當多醫聚訟或決之立斃或決之成廢邀余往已暮執燭視之近燭則痛如錐刺乃父恐余用刀屢述群醫之說余曉之曰汝不欲此子之生余不敢言既邀余來是欲其生也豈可隨聲附和袖手旁觀耶今之外科皆鄉願也抄寫成方虛應故事並無真知灼見更可惡者造作疑似之言簧惑病家有如奸胥猾吏造案雖咎陶聽之猶以為殺無可宥要知腳跟之皮厚於牛領不能下潰必至上穿足面則不可救矣言未已病者曰怪道數日來骨縫錐痛難忍其妻跪求請救而一家數十口猶執不可余曰吾豈挾仇而欲害彼若決之而斃吾償其命可也衆皆咋舌不敢言遂決之出膿半盞敷貼已余至外廳晚膳未畢內報熟睡矣如之何余曰覺來要啜粥矣既而果然三日後吃飯四十日收功然人情畏痛苟安者多故庸醫之言易於入耳病無去路上潰足面腐及內外踝而遷延以死者比比也屠甸鎮王某先患疔毒旋生背疽高腫不紅醫巫術盡家破而病日劇延余往視肌肉全消面無人色脈至斷續如絲按其瘡虛軟漫腫無紅證已七十六日矣流淚被面聲言救命音細如蜂深堪憫惻殊難措手閣家痛哭而求設法余索其方視之先則犀角牛黃繼則參耆歸術之類皆謂內有瘀血虛不化膿也余靜坐籌思七十餘日之瘀血既不化膿亦不消散乃脾胃被伐氣弱難潰內肌盡腐皮厚難穿日久力窮勢瀕於殆若不決則必死設決之而斯須斃命又當如何乃謂其父曰此證內肉盡腐外皮甚厚膿無出路以致背重如山肌肉日消而膿日多勢必消盡而後已吾今籌一死裡求生之法汝可導我復視其父從之因細按其皮略無薄隙可乘不得已久按以亂之卒然一刺得大膿四大碗幸不斃命隨以粥食調之越五日復視已能披衣起坐矣以上數證皆所謂養癰為患也古人原有刀針不可輕用之戒蓋為手法不精或輕淺之證及膿未成時而言也以決之之法誠不易易即辨膿亦甚難脈訣洪滑為膿成而此證脈至如絲刺膿至四大碗脈豈可憑乎然此證若診於三十日內外未始非洪滑也惟醫家誤信補托可使自潰孰知欲托其膿者反能化肌肉以為膿膿日多則氣血日少尚欲尋其洪滑之脈安可得乎昧者猶訾刀針為蠻法嗚呼此與談性命而廢武備寇至不戰委而去之者何以異耶須知此膿不刺必與此身同就木而已余見如此斃命者指不勝屈故憤而為之豈好為瘍醫哉至腿上附骨疽遷延補托而膿隨身斂者則尤多也一婦淵疽膿蓄不潰下至腰前至胸形容骨立聲細如蜂頭暈身熱不食延逾半載求治於余余亦不能措手實深慚愧然此二證皆誤於補托求潰孰知終不可潰元氣未漓者尚可決之求活元氣已漓者膿必隨身而殉一膀胱癰脹痛求死膿自小便而出與八正散加琥珀乳香麝香而愈一男子小腿數日間全腐疼痛難忍與珠黃十寶而痛止腐脫一男子臂腫如腿痠木而硬醫投消散如故余與㠟峒丸二服外敷解散之藥於骱間四面作膿而潰此亦臂上附骨疽也治不得法即難收功一男子唇疔既拔其一復生其七先用蟾酥丸頭面腫退後用犀地加牛黃而愈壬子夏餘次子患乾霍亂身熱不渴舌燥無苔六脈俱伏痛在胃脘連及胸脅勢甚洶湧余與地漿一碗勢少定少頃復作因徑投大承氣湯一帖其痛即下行之臍間又一帖痛又下行伏於少腹右角按之始痛不按則與平人無異起病至此已歷周時思食甚急乃與緑豆煮粥與之食後一切如常惟少腹右角按之仍有小塊隱隱作痛遂重用當歸杞子蔞仁佐以桃仁紅花少加牛膝以導之服一時許腹中汩汩有聲下紫黑血一塊約五寸許而少腹之痛塊若失此病治法原出一時臆見然竟已獲痊特録出質之潛齊不知以為何如愚謂霍亂證因於暑熱者多故感受稍重極易入營古人刺以泄血及內飲茺蔚湯藕汁童便此所以治營分之邪也楊公子舌燥無苔而不渴痛又及脅必平日偶有絡傷未覺乃邪遂乘隙而入也承氣之硝黃並是血藥氣行則瘀降故痛得漸下逮塊在痛未蠲而知飢能食益見氣分之邪已廓而血分之邪尚匿無庸承氣之直攻改從濡化而曲導操縱有法余服其手眼之超
