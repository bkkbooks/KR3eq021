body:
  text: 辨言吾族系出安化籍隸鹽官十四世祖遷於海鹽之水北十九世祖復歸於原籍之舊倉乾隆間曾王父遭海溢之患攜吾祖吾父僑居錢塘嗣為吾父娶於杭生余昆季六人而殤其三故雖行四而字孟英嘗憶吾父之歸葬曾王父暨大父也謂先世邱壟所在意將挈家回籍而未逮道光紀元府君遽捐館舍時余甫十四童昏無知家無擔石儲衣食於奔走有年不獲時省祖墓罪戾實深而敝廬數椽地土數畝亦遂悉為人儥是以先府君之葬勢難歸祔祖塋因循多載吾母命卜地仁和之皋亭山以為海昌便道子孫易於祭掃余敬謹恪遵先孺人棄養即合葬焉逮癸丑春金陵失守杭城遷徙者紛如竊謂吾儕藉硯田以糊其口家無長物辛丑之警有老母在尚不作避地計況今日乎第省會食物皆昂既非寒士之所宜居而婚嫁從華向平之願亦不易了倘風鶴稍平可不繼志以歸籍耶余雖未有子而女已多從子亦數輩必乘其年尚幼稚俾鄉居以習於儉約斯謂遺之以安然族已久疏悵難如願先是有嘉興謝君再華者端人也家於杭之保佑坊以白手致小康甲辰春余謂其地將有郁攸災囑其移居從之及秋而不幸余言偶中謝以獲免感於心至是曲為余籌之久之引一人來曰此管君芝山也與我為垂髫交醇謹朴誠一鄉稱之世居海昌北鄉之渟溪地既幽僻俗亦淳良小有市廛頗堪棲隱距海較遠水患無虞子欲歸故鄉盍與結鄰乎余聞之慰甚遂與訂交既而偕弟季傑拿舟往訪至其地如漁人之入桃源且有朱姓曠宅願我賃心益喜返杭告廟而卜之吉季傑復謀諸趙君笛樓得壬占曰利久居宜子孫而會垣僦居之屋適易主爰諏吉攜眷往家焉時咸豐五年乙卯冬十月中浣三日也回思先府君以四十九歲棄諸孤余昨歲之病幾如湯睢陽與父同壽然而一事無成虛延人世霜侵兩鬢餘年幾何賴良友啓余得以勉承遺志謝君之德曷敢以忘而機緣相湊殆亦先人之靈有以默相歟設謂無田可歸必待買山有資則歲不我與齎此志而弗能償者舉目皆是也余竊悲之乃余自失怙後即攜一硯以泛於江浮於海荏苒三十餘年僅載一硯以歸籍人皆患之而餘載硯時遊亦足以行吾之癡而樂吾餘年他非所知也遊時偶有所録漸積成卷題曰歸硯蓋雖以硯遊而遊為歸之計歸乃遊之本也因識其歸之所以於簡端以為序並示我後人咸豐丁巳冬十一月下浣安化後人南渡第二十七世半癡王士雄書於吳門歸棹題詞揮手湖山意灑然卜居林野愛幽偏濟時有道同良相涉世無機是散仙重慶淵源宏舊緒存仁著述富新編相逢路較前時近易棹王猷雪夜船丙辰春仲秀水愚弟曹大經海槎喜從桑梓話樵漁境僻溪環好結廬非有閒情耽水石每尋佳趣到琴書折肱道契孫思邈苦口言符陸敬輿不盡憂時懷古意且開小圃灌春蔬仁心古誼繼忠州千頃波濤一葉舟書可活人常小試才堪醫國切先憂艾溪老宿牽離緒秀水耆英慨舊遊惆悵生平師友誼靈根天爵要交修世態模稜靜里參有時捫蝨縱清談靈蘭獨悟能砭俗甘蔗旁生祝夢男把卷閒宜窗臥北著書名若鬥垂南會當一遂緇衣好一棹雙橋益訪三幾歲瘡痍未息兵桃源小隱謝浮名高文縱筆千言當妙語揮犀四座傾世外神仙留橘井山中風味足蓴羹一編自有千秋業不獨歸來硯可耕丁巳長夏宜春晚生袁鳳桐敬民回溯神交兩載余獲親光霽快何如名山著述窮元奧濟世襟期藉發攄妻子一廛甘小隱丹黃四壁愛吾廬新編借富規時意許我先窺未見書戊午仲夏同邑教弟周在思二郊曲水回環一碧流渟溪地僻樂清幽居非近市耽歌嘯家有藏書供校讎良相救時同妙手奇方獲解豁雙眸先生此道肱三折苦口言如藥石投高曠襟期志氣恬不貪為寶勵雞廉功深著作琳琅富學究岐黃歲月淹種杏成林追董奉撫松歸隱似陶潛孱軀一再叨仁術黍谷回春勿藥占戊午新秋歸安女史章華徵生不為相當為醫一掃寰宇之瘡痍吸水直須窮上池洞燭癥結如燃犀真宰上訴閶闔披乃許司命侔神祗我觀毒藥供醫師十失三四猶次之食不制兮事不稽無怪使我生狐疑吁嗟乎富貴溺心鼎爐欹功利奪人龍虎飛群魔欹正艱且危乾坤不交坎離暌世事如雲類若斯靈丹一粒珍刀圭王君抱硯歸渟溪布衣蔬食甘掩扉著書索隱探淵微世人未見驚新奇天雞𪆱旦醒夢迷名山一席傳者誰己未春仲仁和趙夢齡菊齊氏先生自是人中龍二十八宿羅心胸岐黃術欲追上古盧醫扁鵲將無同偶然著作歸硯編闡揚至理開蠶叢笑他世上爭名客蕉鹿繁華駒過隙恬淡真如張季鷹逍遙直似陶彭澤轉瞬滄桑事可悲吳山看遍劫灰飛申屠卓識先歸隱早向渟溪掩竹扉輞川莊好春風靜扁舟似入桃源境屋後時聞欸乃聲門前且看桑榆景避亂重來訪舊遊依然把酒話田疇當年曾起膏肓疾回首而今已十秋受恩深愧酬無力坎壈愁常淚沾臆往事淒涼不忍談故園今已生荊棘何日三吳息戰爭與君相約結比鄰硯田同作歸耕計對榻西窗論道經庚申孟夏仁和世侄胡耀曾榮甫渟溪深處結茅廬遍地瘡痍孰療除惟此石交堪與共歸來且著活人書遁世逍遙寄睡鄉回春妙手擅岐黃編成小録千秋業重慶遺書合瓣香把卷蓬窗動旅懷申江一棹與君偕思歸已是無家客悽絶當年賜硯齊同治元年仲夏錢塘後學戴穗孫跋是書鐫於杭托徐君亞枝校讎庚申春刻甫竣而杭垣失守逮援兵來賊遁去杭人慮其復至率遷避承鬍子榮甫挈版畀余顧僻鄉無攻木之工迄未修校辛酉秋海昌日蹙余攜以棲於濮院改字夢隱逮季冬杭垣復陷海昌亦潰余不能歸今夏更攜以至滬有元和金君簠齊者讀余書有年亦竄難在此適霍亂大行市醫罔措簠齊遍搜坊間霍亂論大聲疾呼以告人曰指南在是毋走歧途因而救全者不少且嘗於乙巳年輯轉筋證治一書於姑蘇書中多采芻蕘惜版已毀余亦未之知也簠齊與仁和周鶴庭茂才同寓始知余在滬六月十九日遂來訂交善氣迎人使我如坐春風中序齒長余兩歲乃殷殷然必欲執贄門下余何敢當而謙光下濟益可見其虛心好學之不可及矣既而余有瀛洲之遊爰以此版托其修校比返申業已蕆事余方快遇心交於萍寄之時將出諸稿以質正之並欲重訂霍亂論以補前刻之未備詎八月二十八日乙夜陡患霍亂詰朝吳縣華君麗云速余往視已形脈兩脫音嗄汗淋亟授參苓莫從挽救嗚呼余不覺涕下之如雨也回憶亞枝於申春閉城後溘然而逝榮甫於酉冬城陷後未聞下落贈言諸君如海槎菊齊二郊並歸道山敬民孑身竄難來申於六月十七日哭母身亡年甫三十一尤可傷也彭章兩閨秀亦已化去是書之成皆不及見而余曩刻醫書十種版尚在杭諒化劫灰夢境如斯能無感慨且知己零落殆盡更何從而析疑問難哉因泚筆以識余痛同治元年八月夢隱又書於上海之隨息居
