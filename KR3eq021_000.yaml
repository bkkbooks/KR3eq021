front:
  text: 序蓋聞天定勝人人定亦能勝天醫相皆能挽造化之權故先哲有不為良相則為良醫之語也逮世風日下醫道日衰良者罕見矣王公孟英博雅君子也儲八斗之才富五車之學而尤長於醫療疾之神人莫能測著有醫學叢書十六種闡明至理井井指陳其醫案十四卷治法益昭發前人之未發悟前人所未悟上追靈素下纂諸家抉其奧以顯其幽存其純而糾其繆道明世俗之風說盡暗昧之弊分混淆別邪異千古流弊一旦而消萬世蔽蒙一朝而破功蓋前賢學垂後世證無巨細惻隱常存卓識敦行誠人所不能及也往歲歸隱海昌惜蘭女輩未能負笈以從而欽佩之心不能自已茲先生草歸硯録以明志因不揣譾陋而為之序時丙辰三月中浣仁和彭蘭媛敬撰
  hash: sha256:1420b470eb1011ffcf539f71c95ace24a3baf9d9b59e71df1fcf3891e401af23
